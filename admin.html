<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Rack Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=DM+Sans:wght@300;400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#0A0A0F;--s1:#0F0F18;--s2:#14141F;--s3:#1A1A28;--s4:#22223A;--s5:#2E2E50;
  --b:rgba(120,120,255,0.08);--b2:rgba(120,120,255,0.14);--b3:rgba(120,120,255,0.22);
  --t:#F0F0FF;--t2:#A0A0C8;--t3:#6060A0;--t4:#404070;
  --acc:#7C6FFF;--acc2:#A89BFF;--acc3:rgba(124,111,255,0.15);
  --grn:#00FF88;--red:#FF4466;--ylw:#FFD700;--ora:#FF8800;
  --grn2:rgba(0,255,136,0.1);--red2:rgba(255,68,102,0.1);
}
html,body{background:var(--bg);color:var(--t);font-family:'DM Sans',sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:var(--s2);}
::-webkit-scrollbar-thumb{background:var(--s5);border-radius:2px;}
button,input,textarea,select{font-family:'DM Sans',sans-serif;}

/* LOGIN */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at 30% 20%,rgba(124,111,255,0.12),transparent 60%),radial-gradient(ellipse at 70% 80%,rgba(0,255,136,0.06),transparent 50%),var(--bg);}
.login-box{width:360px;padding:40px;}
.login-logo{font-family:'DM Serif Display',serif;font-size:42px;letter-spacing:-0.02em;margin-bottom:4px;}
.login-logo span{color:var(--acc2);}
.login-tag{font-family:'DM Mono',monospace;font-size:11px;color:var(--t3);letter-spacing:.12em;text-transform:uppercase;margin-bottom:36px;}
.lf{margin-bottom:14px;}
.lf label{display:block;font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--t3);margin-bottom:6px;font-family:'DM Mono',monospace;}
.lf input{width:100%;background:var(--s2);border:1px solid var(--b2);border-radius:8px;padding:12px 14px;color:var(--t);font-size:14px;outline:none;transition:all .2s;}
.lf input:focus{border-color:var(--acc);box-shadow:0 0 0 3px var(--acc3);}
.lf input::placeholder{color:var(--t4);}
.login-btn{width:100%;padding:13px;background:var(--acc);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;margin-top:8px;}
.login-btn:hover{background:var(--acc2);}
.login-err{font-size:12px;color:var(--red);margin-top:10px;font-family:'DM Mono',monospace;}

/* LAYOUT */
.layout{display:flex;min-height:100vh;}
.sidebar{width:220px;background:var(--s1);border-right:1px solid var(--b);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:10;}
.sb-logo{padding:24px 20px 20px;border-bottom:1px solid var(--b);}
.sb-logo-t{font-family:'DM Serif Display',serif;font-size:22px;}
.sb-logo-t span{color:var(--acc2);}
.sb-tag{font-family:'DM Mono',monospace;font-size:9px;color:var(--t3);letter-spacing:.1em;text-transform:uppercase;margin-top:2px;}
.sb-nav{flex:1;padding:14px 10px;overflow-y:auto;}
.sb-section{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--t4);padding:12px 10px 6px;}
.sb-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:8px;cursor:pointer;transition:all .15s;color:var(--t3);font-size:13px;font-weight:500;border:none;background:none;width:100%;text-align:left;margin-bottom:2px;}
.sb-item:hover{background:var(--s3);color:var(--t2);}
.sb-item.active{background:var(--acc3);color:var(--acc2);border:1px solid var(--b2);}
.sb-ic{font-size:15px;width:18px;text-align:center;}
.sb-badge{margin-left:auto;background:var(--red2);color:var(--red);font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px;font-family:'DM Mono',monospace;}
.sb-bottom{padding:14px;border-top:1px solid var(--b);}
.sb-user{display:flex;align-items:center;gap:9px;}
.sb-av{width:30px;height:30px;border-radius:50%;background:var(--acc3);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--acc2);}
.sb-uname{font-size:12px;font-weight:600;}
.sb-urole{font-size:10px;color:var(--t3);font-family:'DM Mono',monospace;}
.logout-sb{margin-top:8px;width:100%;padding:8px;background:transparent;border:1px solid var(--b);border-radius:7px;color:var(--t3);font-size:12px;cursor:pointer;transition:all .2s;}
.logout-sb:hover{border-color:var(--red);color:var(--red);}

/* MAIN */
.main{margin-left:220px;flex:1;min-height:100vh;}
.topbar{padding:20px 28px;border-bottom:1px solid var(--b);display:flex;align-items:center;justify-content:space-between;background:var(--bg);position:sticky;top:0;z-index:5;backdrop-filter:blur(10px);}
.page-title{font-size:20px;font-weight:700;letter-spacing:-0.02em;}
.page-sub{font-size:12px;color:var(--t3);margin-top:2px;font-family:'DM Mono',monospace;}
.content{padding:24px 28px;}

/* CARDS */
.cards-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px;}
.kpi{background:var(--s1);border:1px solid var(--b);border-radius:12px;padding:18px;}
.kpi-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--t3);margin-bottom:8px;}
.kpi-val{font-family:'DM Serif Display',serif;font-size:36px;line-height:1;margin-bottom:4px;}
.kpi-sub{font-size:11px;color:var(--t3);}
.kpi-grn .kpi-val{color:var(--grn);}
.kpi-acc .kpi-val{color:var(--acc2);}
.kpi-ylw .kpi-val{color:var(--ylw);}
.kpi-red .kpi-val{color:var(--red);}

/* TABLE */
.table-wrap{background:var(--s1);border:1px solid var(--b);border-radius:12px;overflow:hidden;margin-bottom:20px;}
.table-hd{padding:16px 20px;border-bottom:1px solid var(--b);display:flex;align-items:center;justify-content:space-between;}
.table-title{font-size:14px;font-weight:600;}
.table-sub{font-size:11px;color:var(--t3);font-family:'DM Mono',monospace;margin-top:1px;}
.tbl{width:100%;border-collapse:collapse;}
.tbl th{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--t3);padding:10px 20px;text-align:left;border-bottom:1px solid var(--b);}
.tbl td{padding:12px 20px;font-size:13px;border-bottom:1px solid var(--b);vertical-align:middle;}
.tbl tr:last-child td{border-bottom:none;}
.tbl tr:hover td{background:var(--s2);}
.tbl-av{width:28px;height:28px;border-radius:50%;background:var(--acc3);display:inline-flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:var(--acc2);margin-right:8px;vertical-align:middle;}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;font-family:'DM Mono',monospace;}
.badge-grn{background:var(--grn2);color:var(--grn);}
.badge-red{background:var(--red2);color:var(--red);}
.badge-acc{background:var(--acc3);color:var(--acc2);}
.badge-ylw{background:rgba(255,215,0,0.1);color:var(--ylw);}
.tbl-btn{padding:4px 10px;border-radius:6px;font-size:11px;font-weight:600;border:none;cursor:pointer;transition:all .15s;}
.tbl-btn-acc{background:var(--acc3);color:var(--acc2);}
.tbl-btn-acc:hover{background:var(--acc);color:#fff;}
.tbl-btn-red{background:var(--red2);color:var(--red);}
.tbl-btn-red:hover{background:var(--red);color:#fff;}
.tbl-btn-grn{background:var(--grn2);color:var(--grn);}
.tbl-btn-grn:hover{background:var(--grn);color:#000;}

/* SEARCH BAR */
.search-bar{display:flex;gap:10px;margin-bottom:16px;align-items:center;}
.sb-input{flex:1;background:var(--s2);border:1px solid var(--b2);border-radius:8px;padding:9px 14px;color:var(--t);font-size:13px;outline:none;transition:all .2s;}
.sb-input:focus{border-color:var(--acc);}
.sb-input::placeholder{color:var(--t4);}
.filter-btn{padding:9px 14px;border-radius:8px;border:1px solid var(--b2);background:var(--s2);color:var(--t3);font-size:12px;cursor:pointer;transition:all .15s;}
.filter-btn.on{background:var(--acc3);border-color:var(--acc);color:var(--acc2);}

/* NOTIF COMPOSER */
.notif-box{background:var(--s1);border:1px solid var(--b);border-radius:12px;padding:20px;margin-bottom:20px;}
.notif-title{font-size:14px;font-weight:600;margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.nf{margin-bottom:12px;}
.nf label{display:block;font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--t3);margin-bottom:5px;font-family:'DM Mono',monospace;}
.nf input,.nf textarea,.nf select{width:100%;background:var(--s2);border:1px solid var(--b2);border-radius:8px;padding:10px 13px;color:var(--t);font-size:13px;outline:none;transition:all .2s;font-family:'DM Sans',sans-serif;}
.nf textarea{resize:none;height:80px;}
.nf input:focus,.nf textarea:focus,.nf select:focus{border-color:var(--acc);box-shadow:0 0 0 3px var(--acc3);}
.nf select option{background:var(--s2);}
.send-btn{padding:11px 22px;background:var(--acc);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;}
.send-btn:hover{background:var(--acc2);}
.send-btn:disabled{opacity:.3;cursor:not-allowed;}

/* COPY EDITOR */
.copy-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px;}
.copy-card{background:var(--s1);border:1px solid var(--b);border-radius:12px;padding:18px;}
.copy-key{font-family:'DM Mono',monospace;font-size:10px;color:var(--t3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px;}
.copy-val{font-size:13px;color:var(--t2);line-height:1.6;margin-bottom:10px;}
.copy-edit-btn{padding:5px 12px;border-radius:6px;background:var(--s3);border:1px solid var(--b2);color:var(--t2);font-size:11px;font-weight:500;cursor:pointer;transition:all .15s;}
.copy-edit-btn:hover{background:var(--acc3);color:var(--acc2);border-color:var(--acc);}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:100;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(6px);}
.modal{background:var(--s1);border:1px solid var(--b2);border-radius:14px;padding:26px;width:480px;max-height:80vh;overflow-y:auto;}
.modal-title{font-size:17px;font-weight:700;margin-bottom:16px;letter-spacing:-0.01em;}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;}
.mf-btn{padding:9px 18px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .2s;}
.mf-cancel{background:var(--s3);color:var(--t2);}
.mf-save{background:var(--acc);color:#fff;}
.mf-save:hover{background:var(--acc2);}
.mf-delete{background:var(--red2);color:var(--red);}
.mf-delete:hover{background:var(--red);color:#fff;}

/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;background:var(--s2);color:var(--t);border:1px solid var(--b2);border-radius:10px;padding:12px 18px;font-size:13px;font-weight:500;z-index:999;animation:tin .22s ease;box-shadow:0 8px 32px rgba(0,0,0,.5);}
@keyframes tin{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

/* ACTIVITY */
.act-item{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid var(--b);}
.act-item:last-child{border-bottom:none;}
.act-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:5px;}
.act-grn{background:var(--grn);}
.act-acc{background:var(--acc);}
.act-ylw{background:var(--ylw);}
.act-txt{font-size:12px;color:var(--t2);line-height:1.5;}
.act-txt strong{color:var(--t);font-weight:600;}
.act-time{font-size:10px;color:var(--t3);font-family:'DM Mono',monospace;margin-top:2px;}

/* LOADING */
.spinner{width:24px;height:24px;border:2px solid var(--s4);border-top-color:var(--acc);border-radius:50%;animation:spin .7s linear infinite;margin:40px auto;display:block;}
@keyframes spin{to{transform:rotate(360deg);}}
.empty-state{text-align:center;padding:48px 20px;color:var(--t3);}
.empty-state-i{font-size:32px;margin-bottom:10px;}
.empty-state-t{font-size:13px;font-family:'DM Mono',monospace;}

/* STATS CHART */
.chart-bar-wrap{display:flex;flex-direction:column;gap:8px;padding:4px 0;}
.chart-bar-row{display:flex;align-items:center;gap:10px;}
.chart-bar-label{font-size:11px;color:var(--t2);width:80px;text-align:right;font-family:'DM Mono',monospace;flex-shrink:0;}
.chart-bar-track{flex:1;height:6px;background:var(--s4);border-radius:3px;overflow:hidden;}
.chart-bar-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--acc),var(--acc2));transition:width .6s cubic-bezier(.4,0,.2,1);}
.chart-bar-val{font-size:11px;color:var(--t3);width:30px;font-family:'DM Mono',monospace;}

/* TWO COL */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px;}
.box{background:var(--s1);border:1px solid var(--b);border-radius:12px;padding:18px;}
.box-title{font-size:13px;font-weight:600;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;}
.box-title-sm{font-size:11px;color:var(--t3);font-family:'DM Mono',monospace;font-weight:400;}
  </style>
</head>
<body>

<div id="app"></div>

<script>
const SUPA_URL = "https://scqoqwmkptyxwpiwhkyk.supabase.co";
const SUPA_KEY = "sb_publishable_GPGtFCLX8xNSIvyCznVDrg_K3xhtb4N";
const supa = supabase.createClient(SUPA_URL, SUPA_KEY);

const ADMIN_PASS = "rack2025admin";
const COPIES = {
  "onboarding_1_title": "Descubre tu próxima peli",
  "onboarding_1_sub": "Test de humor en 30 segundos. Rack encuentra el cine exacto para ti.",
  "onboarding_2_title": "Películas, series y más",
  "onboarding_2_sub": "Distingue entre películas, miniseries, series cortas y largas automáticamente.",
  "onboarding_3_title": "Modo Maratón",
  "onboarding_3_sub": "¿Tienes todo el día? Rack te arma una sesión épica completa.",
  "quiz_cta_title": "¿Qué veo hoy?",
  "quiz_cta_sub": "Test de estado de ánimo · personalizado",
  "potw_tag": "✦ TRENDING ESTA SEMANA",
  "marathon_title": "🍿 Modo Maratón",
  "marathon_sub": "Tengo tiempo. Dame todo.",
};

let state = {
  auth: localStorage.getItem("rack_admin_auth") === "1",
  screen: "dashboard",
  users: [], reviews: [], watched: [], watchlist: [],
  loading: false, toast: null, modal: null,
  searchQ: "", filterType: "all",
  copies: JSON.parse(localStorage.getItem("rack_copies") || JSON.stringify(COPIES)),
  notifTitle: "", notifBody: "", notifTarget: "all",
};

function setState(patch) {
  Object.assign(state, patch);
  render();
}

function showToast(msg, type="") {
  setState({toast:{msg,type}});
  setTimeout(()=>setState({toast:null}), 2800);
}

// DATA
async function loadAll() {
  setState({loading:true});
  try {
    const [u, r, w, wl] = await Promise.all([
      supa.from("users").select("*").order("created_at",{ascending:false}),
      supa.from("reviews").select("*").order("created_at",{ascending:false}),
      supa.from("watched").select("*").order("created_at",{ascending:false}),
      supa.from("watchlist").select("*").order("created_at",{ascending:false}),
    ]);
    setState({users:u.data||[], reviews:r.data||[], watched:w.data||[], watchlist:wl.data||[], loading:false});
  } catch(e) {
    setState({loading:false});
    showToast("Error cargando datos","err");
  }
}

async function deleteUser(id) {
  await supa.from("users").delete().eq("id",id);
  setState({users: state.users.filter(u=>u.id!==id), modal:null});
  showToast("Usuario eliminado","ok");
}
async function deleteReview(id) {
  await supa.from("reviews").delete().eq("id",id);
  setState({reviews: state.reviews.filter(r=>r.id!==id), modal:null});
  showToast("Reseña eliminada","ok");
}
async function updateUserScore(id, score) {
  await supa.from("users").update({score}).eq("id",id);
  setState({users: state.users.map(u=>u.id===id?{...u,score}:u), modal:null});
  showToast("Puntuación actualizada","ok");
}
async function sendNotification() {
  if(!state.notifTitle.trim()||!state.notifBody.trim()) return;
  // Store notification in Supabase as a broadcast
  try {
    await supa.from("reviews").insert({
      id: "notif_"+Date.now(),
      user_id: "admin",
      user_name: "Rack Admin",
      handle: "rack_admin",
      film: "📢 " + state.notifTitle,
      text: state.notifBody,
      stars: 0,
      likes: 0,
    });
    showToast("📢 Notificación enviada","ok");
    setState({notifTitle:"", notifBody:""});
  } catch(e) {
    showToast("Error al enviar","err");
  }
}
function saveCopy(key, val) {
  const copies = {...state.copies, [key]:val};
  localStorage.setItem("rack_copies", JSON.stringify(copies));
  setState({copies, modal:null});
  showToast("Copy guardado","ok");
}

// RENDER HELPERS
function ini(n){return(n||"?").split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase();}
function timeAgo(ts){
  if(!ts)return"—";
  const d=new Date(ts),now=new Date();
  const diff=Math.floor((now-d)/1000);
  if(diff<60)return"ahora";if(diff<3600)return Math.floor(diff/60)+"min";
  if(diff<86400)return Math.floor(diff/3600)+"h";return Math.floor(diff/86400)+"d";
}

// SCREENS
function renderDashboard() {
  const totalUsers = state.users.length;
  const totalReviews = state.reviews.length;
  const totalWatched = state.watched.length;
  const avgScore = totalUsers>0 ? Math.round(state.users.reduce((a,u)=>a+(u.score||0),0)/totalUsers) : 0;
  const topUsers = [...state.users].sort((a,b)=>(b.score||0)-(a.score||0)).slice(0,5);
  const recentAct = [...state.watched.slice(0,4).map(w=>({type:"watched",u:w.user_id,f:w.film_title,t:w.created_at,dot:"act-grn"})),
    ...state.reviews.slice(0,3).map(r=>({type:"review",u:r.user_name,f:r.film,t:r.created_at,dot:"act-acc"}))].sort((a,b)=>new Date(b.t)-new Date(a.t)).slice(0,8);
  const maxScore = topUsers[0]?.score||1;

  return `
    <div class="cards-row">
      <div class="kpi kpi-grn"><div class="kpi-label">Usuarios totales</div><div class="kpi-val">${totalUsers}</div><div class="kpi-sub">registrados en Supabase</div></div>
      <div class="kpi kpi-acc"><div class="kpi-label">Reseñas</div><div class="kpi-val">${totalReviews}</div><div class="kpi-sub">publicadas</div></div>
      <div class="kpi kpi-ylw"><div class="kpi-label">Películas vistas</div><div class="kpi-val">${totalWatched}</div><div class="kpi-sub">marcadas en total</div></div>
      <div class="kpi kpi-red"><div class="kpi-label">Pts promedio</div><div class="kpi-val">${avgScore}</div><div class="kpi-sub">por usuario</div></div>
    </div>
    <div class="two-col">
      <div class="box">
        <div class="box-title">Top usuarios <span class="box-title-sm">por puntos</span></div>
        <div class="chart-bar-wrap">
          ${topUsers.map(u=>`
            <div class="chart-bar-row">
              <div class="chart-bar-label">${u.name?.split(" ")[0]||u.handle}</div>
              <div class="chart-bar-track"><div class="chart-bar-fill" style="width:${Math.round((u.score||0)/maxScore*100)}%"></div></div>
              <div class="chart-bar-val">${u.score||0}</div>
            </div>
          `).join("")}
          ${topUsers.length===0?'<div class="empty-state"><div class="empty-state-t">sin usuarios aún</div></div>':""}
        </div>
      </div>
      <div class="box">
        <div class="box-title">Actividad reciente</div>
        <div>
          ${recentAct.map(a=>`
            <div class="act-item">
              <div class="act-dot ${a.dot}"></div>
              <div><div class="act-txt"><strong>${a.u||"?"}</strong> ${a.type==="watched"?"marcó como vista":"reseñó"} <em style="color:var(--acc2)">${a.f||"?"}</em></div><div class="act-time">${timeAgo(a.t)}</div></div>
            </div>
          `).join("")}
          ${recentAct.length===0?'<div class="empty-state"><div class="empty-state-t">sin actividad aún</div></div>':""}
        </div>
      </div>
    </div>
  `;
}

function renderUsers() {
  const q = state.searchQ.toLowerCase();
  const users = state.users.filter(u=>!q||(u.name||"").toLowerCase().includes(q)||(u.handle||"").toLowerCase().includes(q));
  return `
    <div class="search-bar">
      <input class="sb-input" placeholder="Buscar usuario..." value="${state.searchQ}" oninput="setState({searchQ:this.value})"/>
      <button class="tbl-btn tbl-btn-acc" onclick="loadAll()">↻ Actualizar</button>
    </div>
    <div class="table-wrap">
      <div class="table-hd">
        <div><div class="table-title">Usuarios registrados</div><div class="table-sub">${users.length} usuarios</div></div>
      </div>
      <table class="tbl">
        <thead><tr>
          <th>Usuario</th><th>Handle</th><th>Puntos</th><th>Vistas</th><th>Reseñas</th><th>Registrado</th><th>Acciones</th>
        </tr></thead>
        <tbody>
          ${users.map(u=>{
            const wCount = state.watched.filter(w=>w.user_id===u.id).length;
            const rCount = state.reviews.filter(r=>r.user_id===u.id).length;
            return `<tr>
              <td><span class="tbl-av">${ini(u.name)}</span>${u.name||"—"}</td>
              <td style="font-family:'DM Mono',monospace;color:var(--t3)">@${u.handle||"—"}</td>
              <td><span class="badge badge-acc">${u.score||0} pts</span></td>
              <td>${wCount}</td>
              <td>${rCount}</td>
              <td style="font-family:'DM Mono',monospace;font-size:11px;color:var(--t3)">${timeAgo(u.created_at)}</td>
              <td>
                <button class="tbl-btn tbl-btn-acc" style="margin-right:4px" onclick='openEditUser(${JSON.stringify(u)})'>✏️ Editar</button>
                <button class="tbl-btn tbl-btn-red" onclick='confirmDelete("user","${u.id}","${u.name||u.handle}")'>🗑</button>
              </td>
            </tr>`;
          }).join("")}
          ${users.length===0?`<tr><td colspan="7"><div class="empty-state"><div class="empty-state-i">👤</div><div class="empty-state-t">sin usuarios</div></div></td></tr>`:""}
        </tbody>
      </table>
    </div>
  `;
}

function renderReviews() {
  const q = state.searchQ.toLowerCase();
  const reviews = state.reviews.filter(r=>!q||(r.film||"").toLowerCase().includes(q)||(r.user_name||"").toLowerCase().includes(q));
  return `
    <div class="search-bar">
      <input class="sb-input" placeholder="Buscar reseña o película..." value="${state.searchQ}" oninput="setState({searchQ:this.value})"/>
    </div>
    <div class="table-wrap">
      <div class="table-hd">
        <div><div class="table-title">Reseñas publicadas</div><div class="table-sub">${reviews.length} reseñas</div></div>
      </div>
      <table class="tbl">
        <thead><tr><th>Usuario</th><th>Película</th><th>Reseña</th><th>Estrellas</th><th>Likes</th><th>Fecha</th><th></th></tr></thead>
        <tbody>
          ${reviews.map(r=>`<tr>
            <td><span class="tbl-av">${ini(r.user_name)}</span>${r.user_name||"—"}</td>
            <td style="font-weight:600;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.film||"—"}</td>
            <td style="max-width:200px;color:var(--t2);font-size:12px">${(r.text||"").slice(0,80)}${(r.text||"").length>80?"...":""}</td>
            <td><span style="color:var(--ylw)">${"★".repeat(r.stars||0)}</span></td>
            <td>${r.likes||0}</td>
            <td style="font-family:'DM Mono',monospace;font-size:11px;color:var(--t3)">${timeAgo(r.created_at)}</td>
            <td><button class="tbl-btn tbl-btn-red" onclick='confirmDelete("review","${r.id}","${(r.film||"").replace(/'/g,"")}")'>🗑</button></td>
          </tr>`).join("")}
          ${reviews.length===0?`<tr><td colspan="7"><div class="empty-state"><div class="empty-state-i">⭐</div><div class="empty-state-t">sin reseñas</div></div></td></tr>`:""}
        </tbody>
      </table>
    </div>
  `;
}

function renderNotifs() {
  return `
    <div class="notif-box">
      <div class="notif-title">📢 Enviar notificación push</div>
      <div class="nf"><label>Título</label><input placeholder="ej: Nueva función disponible" value="${state.notifTitle}" oninput="setState({notifTitle:this.value})"/></div>
      <div class="nf"><label>Mensaje</label><textarea placeholder="Escribe el mensaje..." oninput="setState({notifBody:this.value})">${state.notifBody}</textarea></div>
      <div class="nf"><label>Destinatarios</label>
        <select onchange="setState({notifTarget:this.value})">
          <option value="all" ${state.notifTarget==="all"?"selected":""}>Todos los usuarios</option>
          <option value="active" ${state.notifTarget==="active"?"selected":""}>Usuarios activos (últimos 7 días)</option>
          <option value="new" ${state.notifTarget==="new"?"selected":""}>Nuevos (últimos 30 días)</option>
        </select>
      </div>
      <div style="display:flex;gap:10px;align-items:center">
        <button class="send-btn" onclick="sendNotification()" ${!state.notifTitle||!state.notifBody?"disabled":""}>📢 Enviar ahora</button>
        <span style="font-size:12px;color:var(--t3)">Se publicará como anuncio en el feed de la app</span>
      </div>
    </div>
    <div class="table-wrap">
      <div class="table-hd"><div><div class="table-title">Historial de notificaciones</div></div></div>
      <table class="tbl">
        <thead><tr><th>Título</th><th>Mensaje</th><th>Enviada</th></tr></thead>
        <tbody>
          ${state.reviews.filter(r=>r.user_id==="admin").map(n=>`<tr>
            <td style="font-weight:600">${(n.film||"").replace("📢 ","")}</td>
            <td style="color:var(--t2);font-size:12px">${n.text||""}</td>
            <td style="font-family:'DM Mono',monospace;font-size:11px;color:var(--t3)">${timeAgo(n.created_at)}</td>
          </tr>`).join("")}
          ${state.reviews.filter(r=>r.user_id==="admin").length===0?`<tr><td colspan="3"><div class="empty-state"><div class="empty-state-t">sin notificaciones enviadas</div></div></td></tr>`:""}
        </tbody>
      </table>
    </div>
  `;
}

function renderCopies() {
  return `
    <div style="margin-bottom:16px;font-size:13px;color:var(--t3)">Edita los textos de la app. Los cambios se guardan localmente — próximamente sincronizados con Supabase.</div>
    <div class="copy-grid">
      ${Object.entries(state.copies).map(([k,v])=>`
        <div class="copy-card">
          <div class="copy-key">${k.replace(/_/g," ")}</div>
          <div class="copy-val">${v}</div>
          <button class="copy-edit-btn" onclick='openEditCopy("${k}","${v.replace(/"/g,"&quot;")}")'>✏️ Editar</button>
        </div>
      `).join("")}
    </div>
  `;
}

function renderWatched() {
  const q = state.searchQ.toLowerCase();
  const items = state.watched.filter(w=>!q||(w.film_title||"").toLowerCase().includes(q));
  return `
    <div class="search-bar">
      <input class="sb-input" placeholder="Buscar película..." value="${state.searchQ}" oninput="setState({searchQ:this.value})"/>
    </div>
    <div class="table-wrap">
      <div class="table-hd"><div><div class="table-title">Películas marcadas como vistas</div><div class="table-sub">${items.length} registros</div></div></div>
      <table class="tbl">
        <thead><tr><th>Usuario</th><th>Película</th><th>Cuándo</th></tr></thead>
        <tbody>
          ${items.map(w=>`<tr>
            <td style="font-family:'DM Mono',monospace;color:var(--t3)">@${w.user_id?.slice(0,8)||"?"}</td>
            <td style="font-weight:600">${w.film_title||"—"}</td>
            <td style="font-family:'DM Mono',monospace;font-size:11px;color:var(--t3)">${timeAgo(w.created_at)}</td>
          </tr>`).join("")}
          ${items.length===0?`<tr><td colspan="3"><div class="empty-state"><div class="empty-state-i">🎬</div><div class="empty-state-t">sin datos</div></div></td></tr>`:""}
        </tbody>
      </table>
    </div>
  `;
}

// MODAL HELPERS
function openEditUser(u) {
  setState({modal:{type:"editUser",user:u,score:u.score||0}});
}
function openEditCopy(key, val) {
  setState({modal:{type:"editCopy",key,val}});
}
function confirmDelete(type, id, name) {
  setState({modal:{type:"confirmDelete",dtype:type,id,name}});
}
function closeModal(){setState({modal:null});}

function renderModal() {
  if(!state.modal) return "";
  const m = state.modal;
  if(m.type==="confirmDelete") return `
    <div class="overlay" onclick="closeModal()">
      <div class="modal" onclick="event.stopPropagation()">
        <div class="modal-title">¿Eliminar ${m.dtype==="user"?"usuario":"reseña"}?</div>
        <p style="font-size:13px;color:var(--t2);line-height:1.6">Vas a eliminar <strong>${m.name}</strong>. Esta acción no se puede deshacer.</p>
        <div class="modal-footer">
          <button class="mf-btn mf-cancel" onclick="closeModal()">Cancelar</button>
          <button class="mf-btn mf-delete" onclick="${m.dtype==="user"?`deleteUser("${m.id}")`:`deleteReview("${m.id}")`}">Eliminar</button>
        </div>
      </div>
    </div>`;
  if(m.type==="editUser") return `
    <div class="overlay" onclick="closeModal()">
      <div class="modal" onclick="event.stopPropagation()">
        <div class="modal-title">Editar usuario · ${m.user.handle}</div>
        <div class="nf"><label>Nombre</label><input value="${m.user.name||""}" id="eu-name"/></div>
        <div class="nf"><label>Puntuación</label><input type="number" value="${m.user.score||0}" id="eu-score"/></div>
        <div class="modal-footer">
          <button class="mf-btn mf-cancel" onclick="closeModal()">Cancelar</button>
          <button class="mf-btn mf-delete" onclick='confirmDelete("user","${m.user.id}","${m.user.name||m.user.handle}")'>Eliminar</button>
          <button class="mf-btn mf-save" onclick="updateUserScore('${m.user.id}',parseInt(document.getElementById('eu-score').value)||0)">Guardar</button>
        </div>
      </div>
    </div>`;
  if(m.type==="editCopy") return `
    <div class="overlay" onclick="closeModal()">
      <div class="modal" onclick="event.stopPropagation()">
        <div class="modal-title">Editar copy</div>
        <div class="nf"><label>${m.key.replace(/_/g," ")}</label><textarea id="copy-ta" style="height:100px">${m.val}</textarea></div>
        <div class="modal-footer">
          <button class="mf-btn mf-cancel" onclick="closeModal()">Cancelar</button>
          <button class="mf-btn mf-save" onclick="saveCopy('${m.key}',document.getElementById('copy-ta').value)">Guardar</button>
        </div>
      </div>
    </div>`;
  return "";
}

// MAIN RENDER
function render() {
  const screens = {
    dashboard:{label:"Dashboard",sub:"Resumen general"},
    users:{label:"Usuarios",sub:"Gestión de cuentas"},
    reviews:{label:"Reseñas",sub:"Moderación de contenido"},
    watched:{label:"Películas vistas",sub:"Actividad de usuarios"},
    notifs:{label:"Notificaciones",sub:"Comunicación con usuarios"},
    copies:{label:"Copies",sub:"Textos de la app"},
  };
  const nav = [
    {id:"dashboard",ic:"📊",label:"Dashboard"},
    {id:"users",ic:"👥",label:"Usuarios"},
    {id:"reviews",ic:"⭐",label:"Reseñas"},
    {id:"watched",ic:"🎬",label:"Películas vistas"},
    {id:"notifs",ic:"📢",label:"Notificaciones"},
    {id:"copies",ic:"✏️",label:"Copies"},
  ];
  const cur = screens[state.screen]||screens.dashboard;

  if(!state.auth) {
    document.getElementById("app").innerHTML = `
      <div class="login-wrap">
        <div class="login-box">
          <div class="login-logo">ra<span>ck</span></div>
          <div class="login-tag">Admin Panel · Acceso restringido</div>
          <div class="lf"><label>Contraseña</label><input type="password" id="admin-pass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doAdminLogin()"/></div>
          <button class="login-btn" onclick="doAdminLogin()">Entrar →</button>
          <div class="login-err" id="login-err"></div>
        </div>
      </div>
    `;
    return;
  }

  const contentMap = {
    dashboard: renderDashboard,
    users: renderUsers,
    reviews: renderReviews,
    watched: renderWatched,
    notifs: renderNotifs,
    copies: renderCopies,
  };
  const contentFn = contentMap[state.screen]||renderDashboard;

  document.getElementById("app").innerHTML = `
    <div class="layout">
      <div class="sidebar">
        <div class="sb-logo">
          <div class="sb-logo-t">ra<span>ck</span></div>
          <div class="sb-tag">Admin Panel</div>
        </div>
        <div class="sb-nav">
          <div class="sb-section">General</div>
          ${nav.map(n=>`<button class="sb-item${state.screen===n.id?" active":""}" onclick="setState({screen:'${n.id}',searchQ:''})"><span class="sb-ic">${n.ic}</span>${n.label}${n.id==="reviews"&&state.reviews.length>0?`<span class="sb-badge">${state.reviews.length}</span>`:""}</button>`).join("")}
        </div>
        <div class="sb-bottom">
          <div class="sb-user">
            <div class="sb-av">A</div>
            <div><div class="sb-uname">Admin</div><div class="sb-urole">rack_admin</div></div>
          </div>
          <button class="logout-sb" onclick="doAdminLogout()">Cerrar sesión</button>
        </div>
      </div>
      <div class="main">
        <div class="topbar">
          <div><div class="page-title">${cur.label}</div><div class="page-sub">${cur.sub}</div></div>
          <div style="display:flex;gap:8px;align-items:center">
            <span style="font-size:11px;color:var(--t3);font-family:'DM Mono',monospace">${state.users.length} usuarios · ${state.reviews.length} reseñas</span>
            <button class="tbl-btn tbl-btn-acc" onclick="loadAll()">↻</button>
          </div>
        </div>
        <div class="content">
          ${state.loading?'<div class="spinner"></div>':contentFn()}
        </div>
      </div>
    </div>
    ${renderModal()}
    ${state.toast?`<div class="toast" style="${state.toast.type==="ok"?"border-color:var(--grn);color:var(--grn)":state.toast.type==="err"?"border-color:var(--red);color:var(--red)":""}">${state.toast.msg}</div>`:""}
  `;
}

function doAdminLogin() {
  const p = document.getElementById("admin-pass")?.value;
  if(p===ADMIN_PASS){
    localStorage.setItem("rack_admin_auth","1");
    setState({auth:true});
    loadAll();
  } else {
    document.getElementById("login-err").textContent = "Contraseña incorrecta";
  }
}
function doAdminLogout() {
  localStorage.removeItem("rack_admin_auth");
  setState({auth:false,users:[],reviews:[],watched:[],watchlist:[]});
}

// Init
render();
if(state.auth) loadAll();
</script>
</body>
</html>
