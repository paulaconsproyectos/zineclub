<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#09090B;--s1:#0F0F12;--s2:#18181B;--s3:#1F1F24;--s4:#27272C;--s5:#3F3F46;
  --b:rgba(255,255,255,0.06);--b2:rgba(255,255,255,0.10);--b3:rgba(255,255,255,0.18);
  --t:#F4F4F5;--t2:#A1A1AA;--t3:#71717A;--t4:#52525B;
  --acc:#6366F1;--acc2:#818CF8;--acc3:rgba(99,102,241,0.15);--acc4:rgba(99,102,241,0.08);
  --grn:#22C55E;--red:#EF4444;--ylw:#F59E0B;--prp:#A855F7;--blu:#3B82F6;--org:#F97316;
}
html,body{background:var(--bg);color:var(--t);font-family:'DM Sans',sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased;overscroll-behavior:none;}
#root{max-width:430px;margin:0 auto;min-height:100vh;}
button,input,textarea{font-family:'DM Sans',sans-serif;}
::-webkit-scrollbar{width:0;}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
@keyframes floatPts{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-60px)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
@keyframes tin{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.fade-in{animation:fadeIn .25s ease;}
.skel{background:linear-gradient(90deg,var(--s2) 25%,var(--s3) 50%,var(--s2) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:10px;}
.app{max-width:430px;margin:0 auto;min-height:100vh;background:var(--bg);}
.page{padding:0 18px 110px;}
.ph{padding:52px 18px 14px;display:flex;justify-content:space-between;align-items:center;}
.logo{font-family:'DM Serif Display',serif;font-size:22px;color:var(--t);}
.logo span{color:var(--acc2);}
.sec{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--t3);margin-bottom:11px;margin-top:22px;}
/* ONBOARDING */
.ob{min-height:100vh;display:flex;flex-direction:column;}
.ob-slides{flex:1;position:relative;overflow:hidden;min-height:52vh;}
.ob-slide{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 32px;gap:14px;transition:opacity .35s,transform .35s;}
.ob-slide.active{opacity:1;transform:translateX(0);}
.ob-slide.prev{opacity:0;transform:translateX(-32px);}
.ob-slide.next{opacity:0;transform:translateX(32px);}
.ob-logo{font-family:'DM Serif Display',serif;font-size:56px;color:var(--t);}
.ob-logo span{color:var(--acc2);}
.ob-title{font-size:24px;font-weight:700;text-align:center;line-height:1.2;letter-spacing:-0.02em;}
.ob-sub{font-size:14px;color:var(--t2);text-align:center;line-height:1.7;max-width:280px;font-weight:300;}
.ob-dots{display:flex;gap:6px;justify-content:center;padding:12px 0;}
.ob-dot{width:6px;height:6px;border-radius:3px;background:var(--s5);transition:all .3s;}
.ob-dot.on{width:22px;background:var(--acc);}
.ob-bottom{padding:18px 28px 48px;display:flex;flex-direction:column;gap:10px;}
/* LANDING */
.land{min-height:100vh;display:flex;flex-direction:column;background:radial-gradient(ellipse at 50% -10%,rgba(99,102,241,0.22) 0%,transparent 65%),var(--bg);}
.land-hero{flex:1;display:flex;flex-direction:column;justify-content:flex-end;padding:80px 28px 40px;}
.land-logo{font-family:'DM Serif Display',serif;font-size:72px;letter-spacing:-0.03em;line-height:1;margin-bottom:10px;color:var(--t);}
.land-logo span{color:var(--acc2);}
.land-tag{font-size:16px;color:var(--t2);max-width:260px;line-height:1.6;font-weight:300;}
.land-bottom{padding:24px 28px 52px;display:flex;flex-direction:column;gap:10px;}
/* BUTTONS */
.btn{width:100%;padding:16px;border:none;border-radius:13px;font-size:15px;font-weight:600;transition:all .18s;cursor:pointer;}
.btn-p{background:var(--acc);color:#fff;}
.btn-s{background:var(--s2);color:var(--t2);border:1px solid var(--b2);}
.btn-ghost{background:none;border:none;color:var(--t3);font-size:13px;padding:8px;width:100%;cursor:pointer;}
/* AUTH */


.back-btn{width:36px;height:36px;border-radius:10px;background:var(--s2);border:1px solid var(--b);display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--t2);cursor:pointer;}
.auth-ttl{font-size:30px;font-weight:700;letter-spacing:-0.04em;margin-bottom:8px;line-height:1.1;color:#fff;}
.auth-sub{font-size:14px;color:rgba(255,255,255,0.45);margin-bottom:28px;}
.field{margin-bottom:16px;}
.field label{display:block;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,0.35);margin-bottom:7px;}
.field input{width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:15px 16px;color:var(--t);font-size:15px;outline:none;transition:all .2s;backdrop-filter:blur(4px);}
.field input:focus{border-color:rgba(99,102,241,0.6);background:rgba(99,102,241,0.05);}
.field input::placeholder{color:var(--t4);}
.auth-err{font-size:13px;color:var(--red);margin-bottom:12px;padding:10px 14px;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);border-radius:8px;}
.demo-hint{margin-top:11px;padding:10px 13px;background:var(--s2);border:1px solid var(--b);border-radius:9px;font-size:12px;color:var(--t3);line-height:1.6;}
.demo-hint strong{color:var(--t2);}
.auth-hint{font-size:13px;color:var(--t3);text-align:center;margin-top:16px;}
.auth-hint button{background:none;border:none;color:var(--acc2);font-size:13px;font-weight:500;cursor:pointer;}
/* NAV */
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(9,9,11,0.94);backdrop-filter:blur(28px);border-top:1px solid var(--b);padding:6px 0 26px;z-index:100;display:flex;justify-content:space-around;}
.nb{display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;color:var(--t4);font-size:9px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;padding:6px 10px;border-radius:10px;transition:color .2s;min-width:52px;cursor:pointer;}
.nb.active{color:var(--acc2);}
.nb-ic{width:20px;height:20px;display:flex;align-items:center;justify-content:center;}
.nb-ic svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
/* HOME */



.quiz-cta{background:linear-gradient(135deg,#4F46E5,#7C3AED);border:none;border-radius:16px;padding:18px 20px;display:flex;align-items:center;justify-content:space-between;width:100%;color:#fff;margin-bottom:10px;box-shadow:0 8px 28px rgba(99,102,241,0.3);cursor:pointer;}
.marathon-cta{background:linear-gradient(135deg,#78350F,#B45309);border:none;border-radius:14px;padding:15px 18px;display:flex;align-items:center;justify-content:space-between;width:100%;color:#fff;margin-bottom:10px;cursor:pointer;}

.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:12px;}
.stat-card{background:var(--s1);border:1px solid var(--b);border-radius:12px;padding:14px 10px;text-align:center;}
.stat-n{font-family:'DM Serif Display',serif;font-size:26px;line-height:1;}
.stat-l{font-size:9px;color:var(--t3);font-weight:600;letter-spacing:.05em;text-transform:uppercase;margin-top:3px;}
.potw-card{border-radius:14px;overflow:hidden;margin-bottom:10px;position:relative;cursor:pointer;}
.potw-bg{width:100%;height:170px;object-fit:cover;display:block;}
.potw-ov{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.9) 0%,transparent 60%);padding:12px;}
.potw-tag{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--ylw);margin-bottom:3px;}
.potw-title{font-size:17px;font-weight:700;position:absolute;bottom:12px;left:12px;right:12px;line-height:1.2;}
.invite-row{background:var(--acc4);border:1px solid rgba(99,102,241,0.2);border-radius:12px;padding:13px 15px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;margin-bottom:10px;}
.ir-t{font-size:13px;font-weight:600;color:var(--acc2);margin-bottom:1px;}
.ir-s{font-size:11px;color:var(--t3);}
.notif-ban{background:rgba(99,102,241,0.08);border:1px solid rgba(99,102,241,0.2);border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.notif-ban-btn{background:var(--acc);color:#fff;border:none;border-radius:8px;padding:7px 13px;font-size:12px;font-weight:600;flex-shrink:0;cursor:pointer;}
.streak-card{background:linear-gradient(135deg,rgba(245,158,11,0.15),rgba(245,158,11,0.05));border:1px solid rgba(245,158,11,0.25);border-radius:13px;padding:13px 15px;display:flex;align-items:center;gap:12px;margin-bottom:10px;}
.streak-n{font-family:'DM Serif Display',serif;font-size:34px;color:var(--ylw);line-height:1;}
.streak-label{font-size:13px;font-weight:700;margin-bottom:2px;}
.streak-sub{font-size:11px;color:var(--t3);}
/* QUIZ */
.quiz-page{min-height:100vh;display:flex;flex-direction:column;background:var(--bg);}
.quiz-hd{padding:52px 18px 18px;display:flex;align-items:center;gap:12px;}
.quiz-prog{flex:1;height:3px;background:var(--s3);border-radius:2px;overflow:hidden;}
.quiz-fill{height:100%;background:linear-gradient(90deg,var(--acc),var(--acc2));border-radius:2px;transition:width .4s;}
.q-exit{background:var(--s2);border:1px solid var(--b);border-radius:8px;color:var(--t3);font-size:11px;font-weight:600;padding:5px 10px;cursor:pointer;}
.quiz-body{padding:4px 18px 40px;flex:1;}
.q-step{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--acc2);margin-bottom:7px;}
.q-q{font-size:26px;font-weight:700;letter-spacing:-0.03em;line-height:1.2;margin-bottom:26px;}
.opts-swipe{display:flex;flex-direction:column;gap:6px;}
.opt-sw{padding:16px 18px;border:1.5px solid var(--b2);border-radius:14px;background:var(--s1);text-align:left;font-size:15px;color:var(--t2);display:flex;align-items:center;justify-content:space-between;font-weight:400;cursor:pointer;transition:all .15s;width:100%;}
.opt-sw:active,.opt-sw.sel{border-color:var(--acc);background:var(--acc3);color:var(--t);}
.opts-2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.quiz-next{margin-top:18px;width:100%;padding:14px;background:var(--acc);color:#fff;border:none;border-radius:11px;font-size:14px;font-weight:600;cursor:pointer;}
.quiz-next:disabled{opacity:.2;cursor:not-allowed;}
/* TIKTOK / SWIPE MODE */
.tk-page{position:fixed;top:0;left:0;right:0;bottom:0;background:#000;z-index:200;width:100%;height:100%;}
.tk-feed{height:100vh;overflow-y:scroll;scroll-snap-type:y mandatory;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.tk-feed::-webkit-scrollbar{display:none;}
.tk-card{height:100vh;width:100%;scroll-snap-align:start;position:relative;overflow:hidden;}
.tk-bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
.tk-grad{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.97) 0%,rgba(0,0,0,.4) 50%,rgba(0,0,0,.25) 100%);}
.tk-iframe{position:absolute;inset:0;width:100%;height:100%;border:none;pointer-events:none;}
.tk-top{position:absolute;top:0;left:0;right:0;padding:52px 18px 12px;display:flex;align-items:center;justify-content:space-between;background:linear-gradient(to bottom,rgba(0,0,0,.7),transparent);z-index:5;}
.tk-close{background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.15);border-radius:50%;width:36px;height:36px;color:#fff;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.tk-counter{font-size:12px;color:rgba(255,255,255,.6);font-weight:600;}
.tk-dots{display:flex;gap:3px;}
.tk-dot{height:3px;width:6px;border-radius:2px;background:rgba(255,255,255,.3);transition:all .3s;}
.tk-dot.on{width:14px;background:#fff;}
.tk-content{position:absolute;bottom:0;left:0;right:70px;padding:20px 18px 110px;}
.tk-type{display:inline-block;padding:3px 10px;border-radius:20px;background:rgba(99,102,241,0.35);color:#a5b4fc;font-size:10px;font-weight:700;margin-bottom:8px;}
.tk-title{font-size:22px;font-weight:700;line-height:1.2;margin-bottom:5px;}
.tk-meta{font-size:13px;color:rgba(255,255,255,.6);margin-bottom:8px;}
.tk-desc{font-size:12px;color:rgba(255,255,255,.65);line-height:1.6;margin-bottom:14px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
.tk-row{display:flex;gap:8px;}
.tk-btn{padding:9px 16px;border-radius:22px;border:none;font-size:13px;font-weight:600;cursor:pointer;}
.tk-sidebar{position:absolute;right:0;bottom:110px;width:66px;display:flex;flex-direction:column;align-items:center;gap:20px;}
.tk-action{display:flex;flex-direction:column;align-items:center;gap:4px;background:none;border:none;color:#fff;cursor:pointer;}
.tk-ic{width:48px;height:48px;border-radius:50%;background:rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.15);}
.tk-ic.done{background:rgba(99,102,241,.4);border-color:rgba(99,102,241,.7);}
.tk-ic.saved{background:rgba(34,197,94,.25);border-color:rgba(34,197,94,.5);}
.tk-lbl{font-size:10px;font-weight:600;color:rgba(255,255,255,.7);}
.tk-hint{position:absolute;bottom:85px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:3px;animation:pulse 2s infinite;pointer-events:none;}
.tk-hint-arr{font-size:18px;color:rgba(255,255,255,.45);}
.tk-hint-txt{font-size:10px;color:rgba(255,255,255,.35);font-weight:600;letter-spacing:.06em;text-transform:uppercase;}
/* SEARCH */
.search-hd{padding:52px 18px 0;}
.search-box{position:relative;margin-bottom:13px;}
.search-input{width:100%;background:var(--s2);border:1px solid var(--b2);border-radius:12px;padding:13px 38px;color:var(--t);font-size:15px;outline:none;transition:all .2s;}
.search-input:focus{border-color:var(--acc);}
.search-input::placeholder{color:var(--t4);}
.si-ic{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:14px;color:var(--t3);}
.si-cl{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:var(--s4);border:none;color:var(--t3);width:22px;height:22px;border-radius:50%;font-size:11px;cursor:pointer;}
.ptabs{display:flex;gap:5px;overflow-x:auto;padding-bottom:8px;}
.ptabs::-webkit-scrollbar{display:none;}
.ptab{flex-shrink:0;padding:6px 13px;border-radius:20px;border:1px solid var(--b2);background:var(--s2);color:var(--t3);font-size:12px;font-weight:500;cursor:pointer;}
.ptab.on{background:var(--acc);border-color:var(--acc);color:#fff;}
/* FILM LIST */
.fli{display:flex;gap:10px;padding:11px 0;border-bottom:1px solid var(--b);cursor:pointer;}
.fli:last-child{border-bottom:none;}
.fli-p{width:52px;height:78px;border-radius:8px;object-fit:cover;flex-shrink:0;background:var(--s3);}
.fli-pe{width:52px;height:78px;border-radius:8px;background:var(--s3);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.fli-info{flex:1;min-width:0;padding-top:1px;}
.fli-title{font-size:14px;font-weight:600;margin-bottom:2px;line-height:1.3;}
.fli-meta{font-size:11px;color:var(--t3);margin-bottom:4px;display:flex;align-items:center;gap:5px;flex-wrap:wrap;}
.fli-sc{color:var(--ylw);font-weight:600;}
.fli-desc{font-size:11px;color:var(--t2);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:5px;}
.fli-acts{display:flex;gap:4px;flex-wrap:wrap;}
.pb{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;border:none;cursor:pointer;}
.pb-acc{background:var(--acc3);color:var(--acc2);}
.pb-done{background:rgba(34,197,94,.1);color:var(--grn);}
.pb-neu{background:var(--s3);color:var(--t2);}
/* RESULTS */
.res-hd{padding:52px 18px 14px;}
.res-lbl{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--acc2);margin-bottom:4px;}
.res-title{font-size:24px;font-weight:700;letter-spacing:-0.03em;}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
.fthumb{background:var(--s1);border:1px solid var(--b);border-radius:13px;overflow:hidden;cursor:pointer;}
.fthumb img{width:100%;aspect-ratio:2/3;object-fit:cover;display:block;}
.fthumb-e{width:100%;aspect-ratio:2/3;background:var(--s3);display:flex;align-items:center;justify-content:center;font-size:30px;}
.fthumb-info{padding:8px 9px 10px;}
.fti-t{font-size:12px;font-weight:600;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.fti-m{font-size:10px;color:var(--t3);display:flex;align-items:center;gap:4px;}
.fti-sc{color:var(--ylw);font-weight:600;}
.type-pill{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;}
/* LOADING */
.loading-page{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:14px;}
.spinner{width:30px;height:30px;border:2px solid var(--s4);border-top-color:var(--acc);border-radius:50%;animation:spin .7s linear infinite;}
/* DETAIL */











.scores-row{display:flex;gap:6px;margin-bottom:14px;}
.spill{padding:9px 12px;border-radius:9px;background:var(--s2);border:1px solid var(--b);text-align:center;min-width:58px;}
.spill-n{font-family:'DM Serif Display',serif;font-size:19px;color:var(--ylw);line-height:1;}
.spill-l{font-size:9px;color:var(--t3);font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin-top:1px;}






.cast-row{display:flex;gap:7px;overflow-x:auto;padding-bottom:4px;margin-bottom:18px;}
.cast-row::-webkit-scrollbar{display:none;}
.cast-item{flex-shrink:0;text-align:center;width:58px;}
.cast-av{width:44px;height:44px;border-radius:50%;background:var(--s3);margin:0 auto 4px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:var(--t2);}
.cast-name{font-size:9px;color:var(--t2);line-height:1.3;}



.trailer-wrap iframe{width:100%;height:100%;border:none;}
.sim-row{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin-bottom:18px;}
.sim-row::-webkit-scrollbar{display:none;}
.sim-card{flex-shrink:0;width:80px;cursor:pointer;}
.sim-card img{width:80px;height:120px;border-radius:8px;object-fit:cover;display:block;margin-bottom:4px;}
.sim-card-e{width:80px;height:120px;border-radius:8px;background:var(--s3);display:flex;align-items:center;justify-content:center;font-size:24px;margin-bottom:4px;}
.sim-ttl{font-size:10px;color:var(--t2);line-height:1.3;text-align:center;}
.mood-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;}
.mood-btn{padding:8px 12px;border-radius:20px;border:1px solid var(--b2);background:var(--s2);font-size:13px;cursor:pointer;}
.mood-btn.sel{border-color:var(--acc);background:var(--acc3);}
.rev-sec{background:var(--s1);border:1px solid var(--b);border-radius:13px;padding:15px;margin-bottom:16px;}
.stars{display:flex;gap:4px;margin-bottom:11px;}
.star{background:none;border:none;font-size:22px;color:var(--s5);padding:0;line-height:1;cursor:pointer;}
.star.on{color:var(--ylw);}
.rev-ta{width:100%;background:var(--s2);border:1px solid var(--b);border-radius:9px;padding:10px 12px;font-size:13px;color:var(--t);resize:none;height:76px;outline:none;font-weight:300;}
.rev-ta::placeholder{color:var(--t3);}
.rev-sub{width:100%;padding:11px;background:var(--acc);color:#fff;border:none;border-radius:9px;font-size:13px;font-weight:600;margin-top:8px;cursor:pointer;}
.rev-sub:disabled{opacity:.2;}
.rc{padding:12px 0;border-bottom:1px solid var(--b);}
.rc:last-child{border-bottom:none;}
.rc-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.rc-ui{display:flex;align-items:center;gap:7px;}
.rc-av{width:26px;height:26px;border-radius:50%;background:var(--s3);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;color:var(--t2);flex-shrink:0;}
.rc-name{font-size:12px;font-weight:600;}
.rc-handle{font-size:10px;color:var(--t3);}
.rc-stars{font-size:10px;color:var(--ylw);}
.rc-txt{font-size:12px;color:var(--t2);line-height:1.6;margin-bottom:7px;font-weight:300;}
.rc-like{background:var(--s2);border:1px solid var(--b);border-radius:20px;font-size:11px;font-weight:500;color:var(--t3);padding:3px 9px;cursor:pointer;}
.rc-like.liked{background:var(--acc3);border-color:var(--acc);color:var(--acc2);}
/* SOCIAL */
.tab-row{display:flex;gap:3px;background:var(--s2);border-radius:10px;padding:3px;margin-bottom:16px;}
.tab-btn{flex:1;padding:7px;border:none;border-radius:7px;font-size:11px;font-weight:600;color:var(--t3);background:transparent;cursor:pointer;}
.tab-btn.active{background:var(--s4);color:var(--t);}
.act-item{padding:11px 0;border-bottom:1px solid var(--b);display:flex;gap:8px;}
.act-av{width:28px;height:28px;border-radius:50%;background:var(--s3);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;color:var(--t3);}
.act-txt{font-size:12px;color:var(--t2);line-height:1.5;}
.act-txt strong{color:var(--t);}
.act-txt em{color:var(--acc2);font-style:normal;}
.act-time{font-size:10px;color:var(--t4);margin-top:1px;}
.rank-row{display:flex;align-items:center;gap:9px;padding:11px 0;border-bottom:1px solid var(--b);}
.rank-row.me{background:var(--acc4);border-radius:10px;padding:11px 10px;}
.rank-n{font-family:'DM Serif Display',serif;font-size:17px;color:var(--t3);width:20px;text-align:center;flex-shrink:0;}
.rank-n.gold{color:var(--ylw);}
.rank-av{width:32px;height:32px;border-radius:50%;background:var(--s3);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:var(--t2);flex-shrink:0;}
.rank-info{flex:1;}
.rank-name{font-size:13px;font-weight:600;margin-bottom:1px;}
.rank-badge{font-size:10px;color:var(--t3);}
.rank-score{font-family:'DM Serif Display',serif;font-size:18px;color:var(--acc2);}
.up-item{display:flex;gap:9px;padding:11px 0;border-bottom:1px solid var(--b);}
.up-p{width:42px;height:63px;border-radius:7px;object-fit:cover;flex-shrink:0;}
.up-pe{width:42px;height:63px;border-radius:7px;background:var(--s3);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.up-title{font-size:13px;font-weight:600;margin-bottom:2px;}
.up-date{font-size:11px;color:var(--acc2);margin-bottom:2px;}
.up-desc{font-size:11px;color:var(--t3);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.tog-track{width:34px;height:19px;border-radius:10px;background:var(--s4);position:relative;cursor:pointer;display:inline-block;}
.tog-track.on{background:var(--acc);}
.tog-thumb{width:15px;height:15px;border-radius:50%;background:#fff;position:absolute;top:2px;left:2px;transition:left .18s;}
.tog-track.on .tog-thumb{left:17px;}
/* PROFILE */
.prof-hd{padding:52px 18px 18px;}
.prof-av{width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,var(--acc),#7C3AED);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;color:#fff;}
.prof-name{font-size:22px;font-weight:700;letter-spacing:-0.02em;margin-bottom:2px;}
.prof-handle{font-size:12px;color:var(--t3);margin-bottom:7px;}

.auth-page{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;position:relative;overflow:hidden;}

.auth-bg-overlay{position:fixed;inset:0;z-index:1;background:linear-gradient(to bottom,rgba(0,0,0,0.55) 0%,rgba(9,9,11,0.82) 40%,rgba(9,9,11,0.97) 100%);}
.auth-top{width:100%;max-width:420px;display:flex;align-items:center;justify-content:center;position:relative;margin-bottom:32px;z-index:2;}
.auth-top .back-btn{position:absolute;left:0;background:none;border:none;color:rgba(255,255,255,0.6);font-size:20px;cursor:pointer;padding:4px;}
.auth-logo{font-family:'DM Serif Display',serif;font-size:15px;letter-spacing:0.06em;color:rgba(255,255,255,0.4);}
.auth-logo span{color:var(--acc);opacity:1;}
.auth-form-wrap{width:100%;max-width:420px;position:relative;z-index:2;}
.auth-film-credit{position:fixed;bottom:100px;left:0;right:0;text-align:center;font-size:11px;color:rgba(255,255,255,0.2);z-index:2;letter-spacing:0.05em;}

.estren-hero{position:relative;width:100%;height:200px;border-radius:18px;overflow:hidden;cursor:pointer;background:#1a1a2e;}

async function tmdbDiscover(answers){
  const mood=answers.mood||"";
  const fmt=answers.format||"Me da igual";
  const time=answers.time||"";
  const vibe=answers.vibe||"";
  const platforms=Array.isArray(answers.platform)?answers.platform:[];
  const isMarathon=time==="Toda la noche";
  const isShort=time==="Menos de 1h";

  // Genre mapping by mood
  const moodGenres=(MOOD_GENRES[mood]||[18]).slice(0,2);

  // Vibe adds extra genre signals
  const VIBE_GENRES={
    "Que me impacte":[18,53],
    "Que me evada":[12,14,878],
    "Que me haga reir":[35,16],
    "Que me asuste":[27,9648],
    "Arte puro":[18,36],
    "Buena historia":[18,80]
  };
  const vibeGenres=VIBE_GENRES[vibe]||[];
  const allGenres=[...new Set([...moodGenres,...vibeGenres])].slice(0,3);
  const genres=allGenres.join(",");

  // Platform to TMDB provider ID
  const todoMeVale=platforms.length===0||platforms.includes("Todo me vale");
  const PIDS_MAP={"Netflix":8,"HBO Max":384,"Max":384,"Disney+":337,"Prime Video":119,"Amazon Prime Video":119,"Filmin":63,"Apple TV+":350,"Movistar+":149};
  const providerIds=todoMeVale?[]:platforms.map(function(p){return PIDS_MAP[p];}).filter(Boolean);
  const providerParam=providerIds.length>0?"&with_watch_providers="+providerIds.join("|")+"&watch_region=ES":"";

  // Duration filter
  const durationParam=isShort?"&with_runtime.lte=90":"";

  const page=Math.floor(Math.random()*5)+1;
  const wM=fmt==="Pelicula"||fmt==="Me da igual"||isMarathon;
  const wT=fmt==="Serie"||fmt==="Me da igual"||isMarathon;
  const fetches=[];

  if(wM)fetches.push(
    fetch(B+"/discover/movie?api_key="+TMDB_KEY+"&language=es-ES&sort_by=vote_average.desc&vote_count.gte=200&with_genres="+genres+providerParam+durationParam+"&page="+page)
    .then(function(r){return r.json();})
    .then(function(d){
      return (d.results||[]).slice(0,isMarathon?6:5).map(function(m){
        return {id:m.id,title:m.title,titleEs:m.title,year:m.release_date?m.release_date.slice(0,4):"",type:"Pelicula",mediaType:"movie",tmdbId:m.id,
          poster:m.poster_path?IMG+m.poster_path:null,backdrop:m.backdrop_path?ORIG+m.backdrop_path:null,
          description:m.overview||"",score:m.vote_average?m.vote_average.toFixed(1):"",streaming:[],genres:[]};
      });
    })
    .catch(function(){return [];})
  );

  if(wT)fetches.push(
    fetch(B+"/discover/tv?api_key="+TMDB_KEY+"&language=es-ES&sort_by=vote_average.desc&vote_count.gte=100&with_genres="+genres+providerParam+"&page="+page)
    .then(function(r){return r.json();})
    .then(function(d){
      return (d.results||[]).slice(0,isMarathon?4:3).map(function(m){
        return {id:m.id,title:m.name,titleEs:m.name,year:m.first_air_date?m.first_air_date.slice(0,4):"",type:"Serie",mediaType:"tv",tmdbId:m.id,
          poster:m.poster_path?IMG+m.poster_path:null,backdrop:m.backdrop_path?ORIG+m.backdrop_path:null,
          description:m.overview||"",score:m.vote_average?m.vote_average.toFixed(1):"",streaming:[],genres:[]};
      });
    })
    .catch(function(){return [];})
  );

  const results=await Promise.all(fetches);
  var all=results.reduce(function(a,b){return a.concat(b);},[]);

  // If provider filter returned 0 results, retry without provider filter
  if(all.length===0&&providerIds.length>0){
    var fallback=await fetch(B+"/discover/movie?api_key="+TMDB_KEY+"&language=es-ES&sort_by=vote_average.desc&vote_count.gte=200&with_genres="+moodGenres.join(",")+"&page="+page)
      .then(function(r){return r.json();})
      .then(function(d){return (d.results||[]).slice(0,8).map(function(m){return {id:m.id,title:m.title,titleEs:m.title,year:m.release_date?m.release_date.slice(0,4):"",type:"Pelicula",mediaType:"movie",tmdbId:m.id,poster:m.poster_path?IMG+m.poster_path:null,backdrop:m.backdrop_path?ORIG+m.backdrop_path:null,description:m.overview||"",score:m.vote_average?m.vote_average.toFixed(1):"",streaming:[],genres:[]};});})
      .catch(function(){return [];});
    all=fallback;
  }

  return all.filter(function(f){return f.poster;});
}

  async function reqNotif(){
    if(!("Notification" in window)){t_("Navegador no compatible");return;}
    var p=await Notification.requestPermission();
    if(p==="granted"){setNotif(true);t_("Notificaciones activadas");try{new Notification("Zine Club",{body:"Te avisaremos de estrenos."});}catch{}}
    else t_("Permisos denegados");
  }

  async function doLogin(){
    if(!lH.trim()||!lP.trim()){setErr("Rellena todos los campos");return;}
    try{
      var res=await sb.from("users").select("*").eq("handle",lH.toLowerCase().trim()).eq("password",lP).single();
      if(res.data&&!res.error){
        var av=LS.get("rack_av_"+res.data.id,res.data.avatar||null);
        setUser(Object.assign({},res.data,{watched:LS.get("rack_w_"+res.data.id,[]),watchlist:LS.get("rack_l_"+res.data.id,[]),avatar:av}));
        setAuth("app");setErr("");updateStreak();return;
      }
    }catch{}
    var saved=LS.get("rack_users",[]);
    var all=DEMO_USERS.map(function(u){return Object.assign({},u,{password:"1234"});}).concat(saved);
    var found=all.find(function(u){return u.handle===lH.toLowerCase().trim()&&u.password===lP;});
    if(!found){setErr("Usuario o contraseña incorrectos");return;}
    setUser(Object.assign({},found,{watched:LS.get("rack_w_"+found.id,[]),watchlist:LS.get("rack_l_"+found.id,[]),avatar:null}));
    setAuth("app");setErr("");updateStreak();
  }

  async function doReg(){
    if(!rN.trim()||!rH.trim()||!rP.trim()||!rE.trim()){setErr("Rellena todos los campos");return;}
    if(rE.indexOf("@")<1||rE.lastIndexOf(".")<rE.indexOf("@")+2){setErr("Email no valido");return;}
    if(!gdprOk){setErr("Acepta la politica de privacidad");return;}
    var handle=rH.toLowerCase().trim();
    try{var res=await sb.from("users").select("id").eq("handle",handle).single();if(res.data){setErr("Usuario ya existe");return;}}catch{}
    var saved=LS.get("rack_users",[]);
    if(DEMO_USERS.concat(saved).find(function(u){return u.handle===handle;})){setErr("Usuario ya existe");return;}
    var nu={id:"u"+Date.now(),name:rN.trim(),handle:handle,password:rP,email:rE.trim(),score:0};
    try{await sb.from("users").insert(nu);}catch{}
    LS.set("rack_users",saved.concat([nu]));
    setUser(Object.assign({},nu,{watched:[],watchlist:[],avatar:null}));setAuth("app");setErr("");updateStreak();
  }

  function doLogout(){setUser(null);setAuth("landing");setScreen("home");setFilms([]);}

  var q=QUESTIONS[quizStep];

  function pickOpt(val){
    if(q.multi){setMulti(function(p){return p.includes(val)?p.filter(function(v){return v!==val;}):[].concat(p,[val]);});return;}
    var a=Object.assign({},answers);a[q.id]=val;setAnswers(a);
    if(quizStep<QUESTIONS.length-1)setTimeout(function(){setQuizStep(function(s){return s+1;});},200);
    else doFetch(a);
  }

  function nextMulti(){
    var a=Object.assign({},answers);a[q.id]=multi;setAnswers(a);
    if(quizStep<QUESTIONS.length-1){setMulti([]);setQuizStep(function(s){return s+1;});}
    else doFetch(a);
  }

  function exitQuiz(){setQuizStep(0);setAnswers({});setMulti([]);setScreen("home");}
  function goQuiz(isM){setScreen("quiz");setQuizStep(0);setAnswers({});setMulti([]);setMarathon(isM||false);}

  async function doFetch(ans){
    var isM=ans.time==="Toda la noche"||marathon;
    setMarathon(isM);setLoading(true);setScreen("results");
    try{
      var r=await tmdbDiscover(ans);
      setFilms(r);
      if(r&&r.length>0){setTkFilms(r);setTkIdx(0);setTkMode(true);}
    }catch{t_("Error al conectar");}
    setLoading(false);
  }

  function isW(f){return !!(user&&(user.watched||[]).find(function(w){return w.id===f.id;}));}
  function isL(f){return !!(user&&(user.watchlist||[]).find(function(w){return w.id===f.id;}));}

  async function markW(f){
    if(!user||isW(f))return;
    var pts=Math.round((parseFloat(f.score)||5)*10);
    try{if(navigator.vibrate)navigator.vibrate([30,20,60]);}catch{}
    setUser(function(p){return Object.assign({},p,{watched:(p.watched||[]).concat([f]),score:(p.score||0)+pts});});
    showPts("+"+pts);updateStreak();
    try{await sb.from("watched").insert({user_id:user.id,film_id:String(f.id),film_title:f.titleEs||f.title,film_data:f});await sb.from("users").update({score:(user.score||0)+pts}).eq("id",user.id);}catch{}
  }

  async function addL(f){
    if(!user||isL(f))return;
    setUser(function(p){return Object.assign({},p,{watchlist:(p.watchlist||[]).concat([f])});});
    t_("Guardada en tu lista");
    try{await sb.from("watchlist").insert({user_id:user.id,film_id:String(f.id),film_title:f.titleEs||f.title,film_data:f});}catch{}
  }

  async function submitRev(f){
    if(!revTxt.trim()||!revSt)return;
    var r={id:"r"+Date.now(),userId:user.id,userName:user.name,handle:user.handle,film:f.titleEs||f.title,text:revTxt,stars:revSt,likes:0,likedBy:[]};
    setReviews(function(p){return [r].concat(p);});setUser(function(p){return Object.assign({},p,{score:(p.score||0)+50});});
    setRevTxt("");setRevSt(0);showPts("+50");
    try{await sb.from("reviews").insert({id:r.id,user_id:user.id,user_name:user.name,handle:user.handle,film:r.film,text:revTxt,stars:revSt,likes:0});}catch{}
  }

  function toggleLike(id){
    if(!user)return;
    setReviews(function(p){return p.map(function(r){
      if(r.id!==id)return r;
      var lk=r.likedBy.includes(user.id);
      return Object.assign({},r,{likes:lk?r.likes-1:r.likes+1,likedBy:lk?r.likedBy.filter(function(x){return x!==user.id;}):[].concat(r.likedBy,[user.id])});
    });});
  }

  function handleAvatarChange(e){
    var file=e.target.files[0];if(!file)return;
    var reader=new FileReader();
    reader.onload=function(ev){
      var dataUrl=ev.target.result;
      setUser(function(p){return Object.assign({},p,{avatar:dataUrl});});
      LS.set("rack_av_"+user.id,dataUrl);t_("Foto actualizada");
    };
    reader.readAsDataURL(file);
  }

    var newName=editNameRef.current?editNameRef.current.value:"";

                    {!notif && (
                      <div className="notif-ban" style={{marginBottom:14}}>
                        <div style={{flex:1}}><div style={{fontSize:13,fontWeight:600,color:"var(--acc2)",marginBottom:2}}>Notificaciones de estrenos</div><div style={{fontSize:11,color:"var(--t3)"}}>No te pierdas ninguno</div></div>
                        <button className="notif-ban-btn" onClick={reqNotif}>Activar</button>
                      </div>
                    )}
                    {upcoming.length===0 && <div style={{textAlign:"center",padding:"32px 0"}}><div className="spinner"/></div>}
                    {upcoming.map(function(f,i){
                      return (
                        <div key={i} className="up-item">
                          {f.poster && <img className="up-p" src={f.poster} alt="" loading="lazy"/>}
                          {!f.poster && <div className="up-pe">—</div>}
                          <div style={{flex:1}}>
                            <div className="up-title">{f.titleEs||f.title}</div>
                            <div className="up-date">{f.releaseDate||f.year}</div>
                            <div className="up-desc">{f.description}</div>
                            <div style={{display:"flex",alignItems:"center",gap:7,marginTop:5}}>
                              <div className={"tog-track"+(notifF[f.id]?" on":"")} onClick={function(){var nf=Object.assign({},notifF);if(nf[f.id])delete nf[f.id];else nf[f.id]=true;setNotifF(nf);t_(notifF[f.id]?"Cancelado":"Te avisaremos");}}>
                                <div className="tog-thumb"/>
                              </div>
                              <span style={{fontSize:11,color:"var(--t3)"}}>{notifF[f.id]?"Activada":"Avisarme"}</span>
                            </div>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
            </div>
          )}

          {/* PROFILE */}
          {screen==="profile" && (
            <div>
              <div className="prof-hd">
                <div style={{position:"relative",width:72,height:72,marginBottom:11}}>
                  {user.avatar && <img src={user.avatar} style={{width:72,height:72,borderRadius:"50%",objectFit:"cover",border:"2px solid var(--acc)"}} alt=""/>}
                  {!user.avatar && <div className="prof-av">{ini(user.name)}</div>}
                  <label style={{position:"absolute",bottom:0,right:0,width:24,height:24,borderRadius:"50%",background:"var(--acc)",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",fontSize:11,color:"#fff",fontWeight:700}}>
                    +<input type="file" accept="image/*" style={{display:"none"}} onChange={handleAvatarChange}/>
                  </label>
                </div>
                {editProf && (
                  <div>
                    <input ref={editNameRef} defaultValue={user.name} style={{background:"var(--s2)",border:"1px solid var(--acc)",borderRadius:8,padding:"8px 12px",color:"var(--t)",fontSize:15,marginBottom:8,width:"100%",outline:"none"}}/>
                    <div style={{display:"flex",gap:6,marginBottom:12}}>
                      <button style={{flex:1,padding:"9px",background:"var(--acc)",color:"#fff",border:"none",borderRadius:9,fontSize:13,fontWeight:600,cursor:"pointer"}} onClick={saveProfile}>Guardar</button>
                      <button style={{flex:1,padding:"9px",background:"var(--s2)",color:"var(--t2)",border:"1px solid var(--b)",borderRadius:9,fontSize:13,cursor:"pointer"}} onClick={function(){setEditProf(false);}}>Cancelar</button>
                    </div>
                  </div>
                )}
                {!editProf && (
                  <div>
                    <div className="prof-name">{user.name}</div>
                    <div className="prof-handle">@{user.handle}</div>
                    <div style={{display:"flex",gap:6,alignItems:"center",marginTop:6,marginBottom:4}}>
                      <div className="prof-badge">{badge&&badge.label}</div>
                      <button style={{background:"var(--s2)",border:"1px solid var(--b)",borderRadius:20,padding:"3px 10px",fontSize:11,color:"var(--t3)",cursor:"pointer"}} onClick={function(){setEditProf(true);}}>Editar</button>
                    </div>
                  </div>
                )}
              </div>
              <div className="page" style={{paddingTop:0}}>
                <div className="score-blk">
                  <div className="score-big">{user.score||0}</div>
                  <div className="score-lbl">Puntos cinéfilos</div>
                  <div className="prog-bar"><div className="prog-fill" style={{width:prog+"%"}}/></div>
                  <div className="prog-labels"><span>{badge&&badge.label}</span>{nextB&&<span>{nextB.label} · {nextB.min-(user.score||0)} pts</span>}</div>
                </div>
                <div className="stats-row">
                  <div className="stat-card"><div className="stat-n">{(user.watched||[]).length}</div><div className="stat-l">Vistas</div></div>
                  <div className="stat-card"><div className="stat-n">{reviews.filter(function(r){return r.userId===user.id;}).length}</div><div className="stat-l">Reseñas</div></div>
                  <div className="stat-card"><div className="stat-n">{(user.watchlist||[]).length}</div><div className="stat-l">Lista</div></div>
                </div>
                <div className="invite-row" onClick={function(){setShowInv(true);}}>
                  <div><div className="ir-t">Código de invitación</div><div style={{fontFamily:"'DM Serif Display',serif",fontSize:18,color:"var(--acc2)",marginTop:3}}>{invCode}</div></div>
                  <span style={{color:"var(--acc2)"}}>→</span>
                </div>
                {(user.watched||[]).length===0 && (user.watchlist||[]).length===0 && (
                  <div className="empty"><div className="empty-t">Aún no has marcado nada</div><button className="empty-cta" onClick={function(){goQuiz(false);}}>Descubrir ahora</button></div>
                )}
                {(user.watched||[]).length>0 && (
                  <div>
                    <div className="sec">Películas vistas</div>
                    {(user.watched||[]).map(function(f,i){
                      return (
                        <div key={i} className="wl-item" onClick={function(){goDetail(f,"profile");}}>
                          {f.poster && <img className="wl-p" src={f.poster} alt="" loading="lazy"/>}
                          {!f.poster && <div className="wl-pe"/>}
                          <div style={{flex:1,minWidth:0}}><div className="wl-title">{f.titleEs||f.title}</div><div className="wl-meta">{f.type||""} · {f.year}</div></div>
                          <div className="wl-pts">+{Math.round((parseFloat(f.score)||5)*10)}</div>
                        </div>
                      );
                    })}
                  </div>
                )}
                {(user.watchlist||[]).length>0 && (
                  <div>
                    <div className="sec">Mi lista</div>
                    {(user.watchlist||[]).map(function(f,i){
                      return (
                        <div key={i} className="wl-item" onClick={function(){goDetail(f,"profile");}}>
                          {f.poster && <img className="wl-p" src={f.poster} alt="" loading="lazy"/>}
                          {!f.poster && <div className="wl-pe"/>}
                          <div style={{flex:1,minWidth:0}}><div className="wl-title">{f.titleEs||f.title}</div><div className="wl-meta">{f.type||""} · {f.year}</div></div>
                        </div>
                      );
                    })}
                  </div>
                )}
                <button className="logout-btn" onClick={doLogout}>Cerrar sesión</button>
              </div>
            </div>
          )}

          {/* NAV */}
          {screen!=="quiz" && (
            <nav className="nav">
              {[{s:"home",l:"Inicio",I:IcoHome},{s:"search",l:"Buscar",I:IcoSearch},{s:"results",l:"Para ti",I:IcoStar,dis:films.length===0},{s:"social",l:"Social",I:IcoUsers},{s:"profile",l:"Perfil",I:IcoUser}].map(function(item){
                return (
                  <button key={item.s} className={"nb"+(screen===item.s?" active":"")} style={{opacity:item.dis?0.3:1}} onClick={item.dis?undefined:function(){setScreen(item.s);}}>
                    <div className="nb-ic"><item.I/></div>
                    <span>{item.l}</span>
                  </button>
                );
              })}
            </nav>
          )}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
<script>
if("serviceWorker" in navigator){window.addEventListener("load",function(){navigator.serviceWorker.register("sw.js").catch(function(){});});}
</script>
</body>
</html>
