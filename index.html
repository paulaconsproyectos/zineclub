async function enrichItem(item) {
  try {
    const r = await fetch(`${B}/${item.mediaType}/${item.tmdbId}?api_key=${TMDB_KEY}&language=es-ES&append_to_response=credits,watch/providers`);
    const d = await r.json();
    const prov = d["watch/providers"]?.results?.ES;
    const streaming = (prov?.flatrate||[]).map(p => p.provider_name);
    let seriesType = "Serie";
    if (item.mediaType === "tv") {
      const eps = d.number_of_episodes||0, seas = d.number_of_seasons||1;
      if (seas===1 && eps<=8) seriesType = "Miniserie";
      else if (seas<=3) seriesType = "Serie corta";
      else seriesType = "Serie larga";
    }
    return {...item,
      genres:(d.genres||[]).slice(0,3).map(g=>g.name),
      director:item.mediaType==="movie"?(d.credits?.crew?.find(c=>c.job==="Director")?.name||""):(d.created_by?.[0]?.name||""),
      cast:(d.credits?.cast||[]).slice(0,3).map(c=>c.name),
      duration:item.mediaType==="movie"?(d.runtime?`${Math.floor(d.runtime/60)}h ${d.runtime%60}min`:""):(d.number_of_seasons?`${d.number_of_seasons} temp.`:""),
      seriesType, streaming, tagline:d.tagline||"",
    };
  } catch { return item; }
}

async function tmdbDiscover(answers) {
  const genres = (MOOD_GENRES[answers.mood]||[18]).slice(0,2).join(",");
  const page = Math.floor(Math.random()*8)+1;
  const fmt = answers.format||"Lo que sea";
  const isMarathon = answers.time==="🍿 Modo Maratón";
  const wM = fmt==="Película"||fmt==="Lo que sea"||isMarathon;
  const wT = fmt!=="Película";
  const fetches = [];
  if (wM) fetches.push(
    fetch(`${B}/discover/movie?api_key=${TMDB_KEY}&language=es-ES&sort_by=vote_average.desc&vote_count.gte=500&with_genres=${genres}&page=${page}`)
    .then(r=>r.json()).then(d=>(d.results||[]).slice(0,isMarathon?6:5).map(m=>({
      id:m.id,title:m.title,titleEs:m.title,year:m.release_date?.slice(0,4)||"—",
      type:"Película",mediaType:"movie",tmdbId:m.id,
      poster:m.poster_path?IMG+m.poster_path:null,backdrop:m.backdrop_path?ORIG+m.backdrop_path:null,
      description:m.overview||"",score:m.vote_average?.toFixed(1),streaming:[],genres:[],
    })))
  );
  if (wT) fetches.push(
    fetch(`${B}/discover/tv?api_key=${TMDB_KEY}&language=es-ES&sort_by=vote_average.desc&vote_count.gte=200&with_genres=${genres}&page=${page}`)
    .then(r=>r.json()).then(d=>(d.results||[]).slice(0,isMarathon?4:3).map(m=>({
      id:m.id,title:m.name,titleEs:m.name,year:m.first_air_date?.slice(0,4)||"—",
      type:"Serie",mediaType:"tv",tmdbId:m.id,
      poster:m.poster_path?IMG+m.poster_path:null,backdrop:m.backdrop_path?ORIG+m.backdrop_path:null,
      description:m.overview||"",score:m.vote_average?.toFixed(1),streaming:[],genres:[],
    })))
  );
  const results = (await Promise.all(fetches)).flat().slice(0,isMarathon?12:8);
  return Promise.all(results.map(enrichItem));
}

async function tmdbWeekly() {
  const r = await fetch(`${B}/trending/all/week?api_key=${TMDB_KEY}&language=es-ES`);
  const d = await r.json();
  const top = (d.results||[])[0]; if(!top) return null;
  const item = {id:top.id,title:top.title||top.name,titleEs:top.title||top.name,
    year:(top.release_date||top.first_air_date||"").slice(0,4),
    type:top.media_type==="movie"?"Película":"Serie",mediaType:top.media_type,tmdbId:top.id,
    poster:top.poster_path?IMG+top.poster_path:null,backdrop:top.backdrop_path?ORIG+top.backdrop_path:null,
    description:top.overview||"",score:top.vote_average?.toFixed(1),streaming:[],genres:[]};
  return enrichItem(item);
}

async function tmdbSearch(q) {
  const r = await fetch(`${B}/search/multi?api_key=${TMDB_KEY}&language=es-ES&query=${enc(q)}&page=1`);
  const d = await r.json();
  return (d.results||[]).filter(m=>m.media_type==="movie"||m.media_type==="tv").slice(0,12).map(m=>({
    id:m.id,title:m.title||m.name,titleEs:m.title||m.name,
    year:(m.release_date||m.first_air_date||"").slice(0,4),
    type:m.media_type==="movie"?"Película":"Serie",
    poster:m.poster_path?IMG+m.poster_path:null,backdrop:m.backdrop_path?ORIG+m.backdrop_path:null,
    description:m.overview||"",score:m.vote_average?.toFixed(1),
    mediaType:m.media_type,tmdbId:m.id,streaming:[],genres:[],
  }));
}

async function tmdbPlatform(platform) {
  const PIDS = {"Netflix":8,"HBO Max":384,"Disney+":337,"Prime Video":119,"Apple TV+":350,"Filmin":44,"Movistar+":149};
  const pid = PIDS[platform]; if(!pid) return [];
  const r = await fetch(`${B}/discover/movie?api_key=${TMDB_KEY}&language=es-ES&sort_by=popularity.desc&watch_region=ES&with_watch_providers=${pid}&page=1`);
  const d = await r.json();
  return (d.results||[]).slice(0,8).map(m=>({
    id:m.id,title:m.title,titleEs:m.title,year:m.release_date?.slice(0,4)||"—",
    type:"Película",mediaType:"movie",tmdbId:m.id,
    poster:m.poster_path?IMG+m.poster_path:null,backdrop:m.backdrop_path?ORIG+m.backdrop_path:null,
    description:m.overview||"",score:m.vote_average?.toFixed(1),streaming:[platform],genres:[],
  }));
}

function StreamLinks({film}) {
  const title = film.titleEs||film.title;
  const known = film.streaming||[];
  return (

      <div style={{fontSize:11,fontWeight:700,letterSpacing:".06em",textTransform:"uppercase",color:"var(--t3)",marginBottom:10,marginTop:20}}>{known.length>0?"Ver ahora en":"Buscar en plataformas"}</div>

          const p = PLATFORMS[name]; if(!p) return null;
          return <a key={name} href={p.url+enc(title)} target="_blank" rel="noopener"
            style={{display:"inline-flex",alignItems:"center",gap:5,padding:"8px 12px",borderRadius:9,background:p.color,color:"#fff",fontSize:12,fontWeight:600,textDecoration:"none"}}>
            {p.icon} {name}

.toggle-lbl{font-size:11px;color:var(--t3);}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.87);z-index:200;display:flex;align-items:flex-end;backdrop-filter:blur(6px);}
.modal{background:var(--s1);border-top:1px solid var(--b2);border-radius:22px 22px 0 0;padding:22px 22px 48px;width:100%;max-width:430px;margin:0 auto;}
.modal-handle{width:32px;height:3px;border-radius:2px;background:var(--s5);margin:0 auto 16px;}
.modal-title{font-size:20px;font-weight:700;letter-spacing:-0.02em;margin-bottom:4px;}
.modal-sub{font-size:13px;color:var(--t2);margin-bottom:18px;line-height:1.6;font-weight:300;}
.code-box{background:var(--s3);border:1px solid var(--b2);border-radius:11px;padding:16px;text-align:center;margin-bottom:16px;}
.code-lbl{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--t3);margin-bottom:6px;}
.code-val{font-family:'DM Serif Display',serif;font-size:38px;letter-spacing:.1em;color:var(--acc2);}
.toast{position:fixed;bottom:88px;left:50%;transform:translateX(-50%);background:var(--s2);color:var(--t);border:1px solid var(--b2);border-radius:20px;padding:8px 16px;font-size:13px;font-weight:500;z-index:999;white-space:nowrap;animation:tin .22s ease;box-shadow:0 8px 24px rgba(0,0,0,.5);pointer-events:none;}
@keyframes tin{from{opacity:0;transform:translateX(-50%) translateY(8px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}
.empty{padding:40px 0;text-align:center;color:var(--t3);}
.empty-i{font-size:36px;margin-bottom:9px;}
.empty-t{font-size:13px;}
`;

function App() {
  const [auth, setAuth] = useState(() => LS.get("rack_auth","onboarding"));
  const [user, setUser] = useState(() => LS.get("rack_user",null));
  const [obStep, setObStep] = useState(0);
  const [authMode, setAuthMode] = useState("login");
  const [screen, setScreen] = useState("home");
  const [prev, setPrev] = useState("home");
  const [films, setFilms] = useState([]);
  const [loading, setLoading] = useState(false);
  const [sel, setSel] = useState(null);
  const [marathon, setMarathon] = useState(false);
  const [potw, setPotw] = useState(null);
  const [quizStep, setQuizStep] = useState(0);
  const [answers, setAnswers] = useState({});
  const [multi, setMulti] = useState([]);
  const [searchQ, setSearchQ] = useState("");
  const [searchRes, setSearchRes] = useState([]);
  const [searching, setSearching] = useState(false);
  const [ptab, setPtab] = useState("all");
  const [platRes, setPlatRes] = useState([]);
  const [loadingPlat, setLoadingPlat] = useState(false);
  const [upcoming, setUpcoming] = useState([]);
  const [notif, setNotif] = useState(() => LS.get("rack_notif",false));
  const [notifF, setNotifF] = useState(() => LS.get("rack_notifF",{}));
  const [reviews, setReviews] = useState(() => LS.get("rack_reviews",DEMO_REVIEWS));
  const [revTxt, setRevTxt] = useState("");
  const [revSt, setRevSt] = useState(0);
  const [socTab, setSocTab] = useState("feed");
  const [toast, setToast] = useState(null);
  const [showInv, setShowInv] = useState(false);
  const [invCode] = useState(() => LS.get("rack_inv_code",genCode()));
  const [lH,setLH] = useState(""); const [lP,setLP] = useState("");
  const [rN,setRN] = useState(""); const [rH,setRH] = useState(""); const [rP,setRP] = useState("");
  const [err, setErr] = useState("");
  const stRef = useRef(null);

  useEffect(()=>LS.set("rack_auth",auth),[auth]);
  useEffect(()=>LS.set("rack_user",user),[user]);
  useEffect(()=>LS.set("rack_reviews",reviews),[reviews]);
  useEffect(()=>LS.set("rack_inv_code",invCode),[invCode]);
  useEffect(()=>LS.set("rack_notif",notif),[notif]);
  useEffect(()=>LS.set("rack_notifF",notifF),[notifF]);
  useEffect(()=>{if(user?.id){LS.set("rack_w_"+user.id,user.watched||[]);LS.set("rack_l_"+user.id,user.watchlist||[]);}},[user?.watched,user?.watchlist]);

  const t_ = msg => { setToast(msg); setTimeout(()=>setToast(null),2500); };

  useEffect(()=>{if(auth==="app") tmdbWeekly().then(setPotw).catch(()=>{});},[auth]);
  useEffect(()=>{if(screen==="social"&&socTab==="estrenos") tmdbUpcoming().then(setUpcoming).catch(()=>{});},[screen,socTab]);
  useEffect(()=>{
    if(ptab==="all"){setPlatRes([]);return;}
    setLoadingPlat(true);
    tmdbPlatform(ptab).then(r=>{setPlatRes(r);setLoadingPlat(false);}).catch(()=>setLoadingPlat(false));
  },[ptab]);
  useEffect(()=>{
    clearTimeout(stRef.current);
    if(!searchQ.trim()||ptab!=="all"){setSearchRes([]);return;}
    setSearching(true);
    stRef.current = setTimeout(async()=>{
      try{const r=await tmdbSearch(searchQ);setSearchRes(r);}catch{}
      setSearching(false);
    },450);
  },[searchQ,ptab]);

  const reqNotif = async () => {
    if(!("Notification" in window)){t_("Navegador no soporta notificaciones");return;}
    const p = await Notification.requestPermission();
    if(p==="granted"){setNotif(true);t_("🔔 Notificaciones activadas");try{new Notification("Rack",{body:"Te avisaremos de los próximos estrenos."});}catch{}}
    else t_("Permisos denegados en ajustes");
  };
  const toggleNotifF = id => setNotifF(p=>{const n={...p};if(n[id])delete n[id];else n[id]=true;return n;});

  const doLogin = () => {
    if(!lH.trim()||!lP.trim()){setErr("Rellena todos los campos");return;}
    const saved = LS.get("rack_users",[]);
    const all = [...DEMO_USERS.map(u=>({...u,password:"1234"})),...saved];
    const found = all.find(u=>u.handle===lH.toLowerCase().trim()&&u.password===lP);
    if(!found){setErr("Usuario o contraseña incorrectos");return;}
    setUser({...found,watched:LS.get("rack_w_"+found.id,[]),watchlist:LS.get("rack_l_"+found.id,[])});
    setAuth("app");setErr("");
  };
  const doReg = () => {
    if(!rN.trim()||!rH.trim()||!rP.trim()){setErr("Rellena todos los campos");return;}
    const saved = LS.get("rack_users",[]);
    if([...DEMO_USERS,...saved].find(u=>u.handle===rH.toLowerCase().trim())){setErr("Usuario ya existe");return;}
    const nu = {id:"u"+Date.now(),name:rN.trim(),handle:rH.toLowerCase().trim(),password:rP,score:0};
    LS.set("rack_users",[...saved,nu]);
    setUser({...nu,watched:[],watchlist:[]});setAuth("app");setErr("");
  };
  const doLogout = () => {setUser(null);setAuth("landing");setScreen("home");setFilms([]);};

  const q = QUESTIONS[quizStep];
  const pickOpt = val => {
    if(q.multi){setMulti(p=>p.includes(val)?p.filter(v=>v!==val):[...p,val]);return;}
    const a = {...answers,[q.id]:val};setAnswers(a);
    if(quizStep<QUESTIONS.length-1) setTimeout(()=>setQuizStep(s=>s+1),180);
    else doFetch(a);
  };
  const nextMulti = () => {
    const a = {...answers,[q.id]:multi};setAnswers(a);
    if(quizStep<QUESTIONS.length-1){setMulti([]);setQuizStep(s=>s+1);}else doFetch(a);
  };
  const exitQuiz = () => {setQuizStep(0);setAnswers({});setMulti([]);setScreen("home");};
  const goQuiz = (isM=false) => {setScreen("quiz");setQuizStep(0);setAnswers({});setMulti([]);setMarathon(isM);};
  const doFetch = async ans => {
    const isM = ans.time==="🍿 Modo Maratón"||marathon;
    setMarathon(isM);setLoading(true);setScreen("results");
    try{const r=await tmdbDiscover({...ans});setFilms(r);}catch{t_("Error al conectar");}
    setLoading(false);
  };

  const isW = f => !!(user?.watched||[]).find(w=>w.id===f.id);
  const isL = f => !!(user?.watchlist||[]).find(w=>w.id===f.id);
  const markW = f => {
    if(!user||isW(f))return;
    const pts = Math.round((parseFloat(f.score)||5)*10);
    setUser(p=>({...p,watched:[...(p.watched||[]),f],score:p.score+pts}));t_(`+${pts} pts`);
  };
  const addL = f => {if(!user||isL(f))return;setUser(p=>({...p,watchlist:[...(p.watchlist||[]),f]}));t_("Guardada");};
  const submitRev = f => {
    if(!revTxt.trim()||!revSt)return;
    const r={id:"r"+Date.now(),userId:user.id,userName:user.name,handle:user.handle,film:f.titleEs||f.title,text:revTxt,stars:revSt,likes:0,likedBy:[]};
    setReviews(p=>[r,...p]);setUser(p=>({...p,score:p.score+50}));setRevTxt("");setRevSt(0);t_("+50 pts");
  };
  const toggleLike = id => {
    if(!user)return;
    setReviews(p=>p.map(r=>{if(r.id!==id)return r;const lk=r.likedBy.includes(user.id);return{...r,likes:lk?r.likes-1:r.likes+1,likedBy:lk?r.likedBy.filter(x=>x!==user.id):[...r.likedBy,user.id]};}));
  };
  const goDetail = (f,from) => {setPrev(from||screen);setSel(f);setScreen("detail");setRevTxt("");setRevSt(0);};

  const badge = user?getBadge(user.score):null;
  const nextB = user?getNext(user.score):null;
  const prog = badge&&nextB?clamp(((user.score-badge.min)/(nextB.min-badge.min))*100,0,100):100;
  const filmRevs = sel?reviews.filter(r=>r.film===(sel.titleEs||sel.title)):[];
  const allUsers = [...DEMO_USERS,...LS.get("rack_users",[])];

  return (
    <div className="app">
      <style>{CSS}</style>
      {toast && <div className="toast">{toast}</div>}

      {showInv && (
        <div className="overlay" onClick={()=>setShowInv(false)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div className="modal-handle"/>
            <div className="modal-title">Invita amigos</div>
            <div className="modal-sub">Cuando se registren con tu código, ambos ganáis 100 puntos.</div>
            <div className="code-box"><div className="code-lbl">Tu código</div><div className="code-val">{invCode}</div></div>
            <button className="btn btn-p" onClick={()=>{try{navigator.clipboard.writeText(`Únete a Rack con mi código ${invCode} → https://paulaconsproyectos.github.io/rack/`);}catch{}t_("Copiado");setShowInv(false);}}>Copiar enlace</button>
            <button className="btn btn-s" style={{marginTop:8}} onClick={()=>setShowInv(false)}>Cerrar</button>
          </div>
        </div>
      )}

      {auth==="onboarding" && (
        <div className="ob">
          <div className="ob-slides">
            <div className={`ob-slide ${obStep===0?"active":obStep>0?"prev":"next"}`}>
              <div className="ob-logo">ra<span>ck</span></div>
              <div className="ob-sub" style={{marginTop:6}}>La app de cine para los que de verdad aman el cine.</div>
            </div>
            {ONBOARDING.map((sl,i)=>(
              <div key={i} className={`ob-slide ${obStep===i+1?"active":obStep>i+1?"prev":"next"}`}>
                <div className="ob-icon">{sl.icon}</div>
                <div className="ob-title">{sl.title}</div>
                <div className="ob-sub">{sl.sub}</div>
              </div>
            ))}
          </div>
          <div className="ob-dots">
            {[0,...ONBOARDING.map((_,i)=>i+1)].map(i=>(
              <div key={i} className={`ob-dot${obStep===i?" on":""}`}/>
            ))}
          </div>
          <div className="ob-bottom">
            <button className="btn btn-p" onClick={()=>obStep<ONBOARDING.length?setObStep(s=>s+1):setAuth("landing")}>
              {obStep<ONBOARDING.length?"Continuar →":"Empezar"}
            </button>
            {obStep<ONBOARDING.length&&<button className="btn-ghost" onClick={()=>setAuth("landing")}>Saltar</button>}
          </div>
        </div>
      )}

      {auth==="landing" && (
        <div className="land">
          <div className="land-hero">
            <div className="land-logo">ra<span>ck</span></div>
            <p className="land-tag">El cine exacto para este momento.</p>
          </div>
          <div className="land-bottom">
            <button className="btn btn-p" onClick={()=>{setAuthMode("register");setAuth("auth");}}>Crear cuenta</button>
            <button className="btn btn-s" onClick={()=>{setAuthMode("login");setAuth("auth");}}>Iniciar sesión</button>
          </div>
        </div>
      )}

      {auth==="auth" && (
        <div className="auth-page">
          <div className="auth-top">
            <button className="back-btn" onClick={()=>{setAuth("landing");setErr("");}}>←</button>
          </div>
          {authMode==="login" ? <React.Fragment>
            <div className="auth-ttl">Bienvenido de vuelta</div>
            <div className="auth-sub">Entra en tu cuenta de Rack</div>
            {err&&<div className="auth-err">{err}</div>}
            <div className="field"><label>Usuario</label><input placeholder="tu_usuario" value={lH} onChange={e=>setLH(e.target.value)} onKeyDown={e=>e.key==="Enter"&&doLogin()}/></div>
            <div className="field"><label>Contraseña</label><input type="password" placeholder="••••••••" value={lP} onChange={e=>setLP(e.target.value)} onKeyDown={e=>e.key==="Enter"&&doLogin()}/></div>
            <div className="demo-hint">Demo: <strong>sofiam</strong>, <strong>marcosr</strong>, <strong>laiat</strong>, <strong>andresb</strong> · pass: <strong>1234</strong></div>
            <button className="btn btn-p" style={{marginTop:16}} onClick={doLogin}>Entrar</button>
            <div className="auth-hint">¿Sin cuenta? <button onClick={()=>{setAuthMode("register");setErr("");}}>Regístrate</button></div>
          </React.Fragment> : <React.Fragment>
            <div className="auth-ttl">Únete a Rack</div>
            <div className="auth-sub">Crea tu perfil de cinéfilo</div>
            {err&&<div className="auth-err">{err}</div>}
            <div className="field"><label>Nombre completo</label><input placeholder="Tu nombre" value={rN} onChange={e=>setRN(e.target.value)}/></div>
            <div className="field"><label>Usuario</label><input placeholder="tu_usuario" value={rH} onChange={e=>setRH(e.target.value)}/></div>
            <div className="field"><label>Contraseña</label><input type="password" placeholder="••••••••" value={rP} onChange={e=>setRP(e.target.value)} onKeyDown={e=>e.key==="Enter"&&doReg()}/></div>
            <button className="btn btn-p" style={{marginTop:14}} onClick={doReg}>Crear cuenta</button>
            <div className="auth-hint">¿Ya tienes cuenta? <button onClick={()=>{setAuthMode("login");setErr("");}}>Inicia sesión</button></div>
          </React.Fragment>}
        </div>
      )}

      {auth==="app" && user && <>

        {screen==="home" && <>
          <div className="home-hero">
            <div className="greet-sm">Buenas,</div>
            <div className="greet-lg">{user.name.split(" ")[0]} <span>👋</span></div>
            {!notif && (
              <div className="notif-ban">
                <div style={{fontSize:22}}>🔔</div>
                <div style={{flex:1}}>
                  <div style={{fontSize:13,fontWeight:600,color:"var(--acc2)",marginBottom:2}}>Activa las notificaciones</div>
                  <div style={{fontSize:11,color:"var(--t3)"}}>Entérate de estrenos según tus gustos</div>
                </div>
                <button className="notif-ban-btn" onClick={reqNotif}>Activar</button>
              </div>
            )}
            <button className="quiz-cta" onClick={()=>goQuiz(false)}>
              <div><div style={{fontSize:17,fontWeight:700,letterSpacing:"-0.02em",marginBottom:2}}>¿Qué veo hoy?</div><div style={{fontSize:12,opacity:.75,fontWeight:300}}>Test de estado de ánimo · personalizado</div></div>
              <div style={{fontSize:36}}>🎬</div>
            </button>
            <button className="marathon-cta" onClick={()=>goQuiz(true)}>
              <div><div style={{fontSize:15,fontWeight:700}}>🍿 Modo Maratón</div><div style={{fontSize:12,opacity:.75,fontWeight:300}}>Tengo tiempo. Dame todo.</div></div>
              <div style={{fontSize:26}}>→</div>
            </button>
          </div>
          <div className="page" style={{paddingTop:8}}>
            {potw && <>
              <div className="sec">Peli de la semana</div>
              <div className="potw-card" onClick={()=>goDetail(potw,"home")}>
                {potw.backdrop?<img className="potw-bg" src={potw.backdrop} alt="" loading="lazy"/>:<div style={{width:"100%",height:170,background:"var(--s2)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:48}}>🎬</div>}
                <div className="potw-ov">
                  <div className="potw-tag">✦ TRENDING ESTA SEMANA</div>
                  <div className="potw-title">{potw.titleEs||potw.title}{potw.score>0?` · ⭐${potw.score}`:""}</div>
                </div>
              </div>
            </>}
            <div className="stats-row">
              <div className="stat-card"><div className="stat-n">{user.score}</div><div className="stat-l">Puntos</div></div>
              <div className="stat-card"><div className="stat-n">{(user.watched||[]).length}</div><div className="stat-l">Vistas</div></div>
              <div className="stat-card"><div className="stat-n">{reviews.filter(r=>r.userId===user.id).length}</div><div className="stat-l">Reseñas</div></div>
            </div>
            {films.length>0&&<button className="btn btn-s" style={{marginBottom:10}} onClick={()=>setScreen("results")}>Ver últimas recomendaciones →</button>}
            <div className="invite-row" onClick={()=>setShowInv(true)}>
              <div><div className="ir-t">Invitar amigos</div><div className="ir-s">+100 pts cuando se registren con tu código</div></div>
              <span style={{color:"var(--acc2)"}}>→</span>
            </div>
            {(user.watchlist||[]).length>0 && <>
              <div className="sec">Mi lista</div>
              {(user.watchlist||[]).slice(0,4).map((f,i)=>(
                <div key={i} className="wl-item" onClick={()=>goDetail(f,"home")}>
                  {f.poster?<img className="wl-p" src={f.poster} alt="" loading="lazy"/>:<div className="wl-pe">🎬</div>}
                  <div style={{flex:1,minWidth:0}}>
                    <div className="wl-title">{f.titleEs||f.title}</div>
                    <div className="wl-meta" style={{display:"flex",gap:5,alignItems:"center"}}><TypePill item={f}/> {f.year}</div>
                  </div>
                </div>
              ))}
            </>}
          </div>
        </>}

        {screen==="search" && <>
          <div className="search-hd">
            <div className="logo" style={{marginBottom:14}}>ra<span>ck</span></div>
            <div className="search-box">
              <span className="si-ic">🔍</span>
              <input className="search-input" placeholder="Busca películas o series..." value={searchQ} onChange={e=>setSearchQ(e.target.value)} autoFocus/>
              {searchQ&&<button className="si-cl" onClick={()=>{setSearchQ("");setSearchRes([]);}}>✕</button>}
            </div>
            <div className="ptabs">
              <button className={`ptab${ptab==="all"?" on":""}`} onClick={()=>setPtab("all")}>Todo</button>
              {Object.keys(PLATFORMS).map(p=>(
                <button key={p} className={`ptab${ptab===p?" on":""}`} onClick={()=>{setPtab(p);setSearchQ("");}}>
                  {PLATFORMS[p].icon} {p}
                </button>
              ))}
            </div>
          </div>
          <div className="page" style={{paddingTop:8}}>
            {ptab==="all" ? <React.Fragment>
              {searching&&<div style={{textAlign:"center",padding:"32px 0",color:"var(--t3)"}}>Buscando...</div>}
              {!searching&&searchRes.length>0&&searchRes.map((f,i)=>(
                <div key={i} className="fli" onClick={()=>goDetail(f,"search")}>
                  {f.poster?<img className="fli-p" src={f.poster} alt="" loading="lazy"/>:<div className="fli-pe">🎬</div>}
                  <div className="fli-info">
                    <div className="fli-title">{f.titleEs||f.title}</div>
                    <div className="fli-meta"><TypePill item={f}/>{f.year&&<span>{f.year}</span>}{f.score>0&&<span className="fli-sc">⭐{f.score}</span>}</div>
                    <div className="fli-desc">{f.description}</div>
                    <div className="fli-acts" onClick={e=>e.stopPropagation()}>
                      <button className={`pb ${isL(f)?"pb-done":"pb-neu"}`} onClick={()=>addL(f)}>{isL(f)?"✓ Lista":"+ Lista"}</button>
                      <button className={`pb ${isW(f)?"pb-done":"pb-acc"}`} onClick={()=>markW(f)}>{isW(f)?"✓ Vista":"Marcar vista"}</button>
                    </div>
                  </div>
                </div>
              ))}
              {!searching&&!searchQ&&<div className="empty"><div className="empty-i">🍿</div><div className="empty-t">Busca cualquier peli o serie</div></div>}
              {!searching&&searchQ&&searchRes.length===0&&<div className="empty"><div className="empty-i">🔎</div><div className="empty-t">Sin resultados para "{searchQ}"</div></div>}
            </React.Fragment> : <React.Fragment>
              {loadingPlat&&<div style={{textAlign:"center",padding:"32px 0",color:"var(--t3)"}}>Cargando {ptab}...</div>}
              {!loadingPlat&&platRes.map((f,i)=>(
                <div key={i} className="fli" onClick={()=>goDetail(f,"search")}>
                  {f.poster?<img className="fli-p" src={f.poster} alt="" loading="lazy"/>:<div className="fli-pe">🎬</div>}
                  <div className="fli-info">
                    <div className="fli-title">{f.titleEs||f.title}</div>
                    <div className="fli-meta"><TypePill item={f}/>{f.year&&<span>{f.year}</span>}{f.score>0&&<span className="fli-sc">⭐{f.score}</span>}</div>
                    <div className="fli-desc">{f.description}</div>
                    <div className="fli-acts" onClick={e=>e.stopPropagation()}>
                      <button className={`pb ${isL(f)?"pb-done":"pb-neu"}`} onClick={()=>addL(f)}>{isL(f)?"✓ Lista":"+ Lista"}</button>
                      <button className={`pb ${isW(f)?"pb-done":"pb-acc"}`} onClick={()=>markW(f)}>{isW(f)?"✓ Vista":"Marcar vista"}</button>
                    </div>
                  </div>
                </div>
              ))}
            </React.Fragment>}
          </div>
        </>}

        {screen==="quiz" && (
          <div className="quiz-page">
            <div className="quiz-hd">
              <div className="quiz-prog"><div className="quiz-fill" style={{width:`${(quizStep/QUESTIONS.length)*100}%`}}/></div>
              <button className="q-exit" onClick={exitQuiz}>Salir</button>
            </div>
            <div className="quiz-body">
              <div className="q-step">{quizStep+1} / {QUESTIONS.length}</div>
              <h2 className="q-q">{q.q}</h2>
              {q.multi ? <React.Fragment>
                <div className="opts-2">
                  {q.opts.map(o=>(
                    <button key={o} className={`opt${multi.includes(o)?" sel":""}`} onClick={()=>pickOpt(o)}>
                      {o}<span className="opt-chk">{multi.includes(o)?"✓":""}</span>
                    </button>
                  ))}
                </div>
                <button className="quiz-next" onClick={nextMulti} disabled={multi.length===0}>Continuar →</button>
              </React.Fragment> : (
                <div className="opts">
                  {q.opts.map(o=>(
                    <button key={o} className={`opt${answers[q.id]===o?" sel":""}`} onClick={()=>pickOpt(o)}>{o}</button>
                  ))}
                </div>
              )}
            </div>
          </div>
        )}

        {screen==="results"&&loading&&(
          <div className="loading-page"><div className="spinner"/><div className="loading-txt">{marathon?"Armando tu maratón...":"Buscando en la cinemateca..."}</div></div>
        )}

        {screen==="results"&&!loading&&(
          <>
            <div className="res-hd">
              <div className="res-lbl">{marathon?"🍿 MODO MARATÓN":"✨ SOLO PARA TI"}</div>
              <div className="res-title">{films.length} recomendaciones</div>
            </div>
            <div className="page" style={{paddingTop:0}}>
              {marathon && (
                <div className="marathon-sec">
                  <div className="ms-title">🍿 Tu sesión maratón</div>
                  {films.slice(0,4).map((f,i)=>(
                    <div key={i} className="ms-item" onClick={()=>goDetail(f,"results")}>
                      <div className="ms-num">{i+1}</div>
                      <div style={{flex:1}}><div className="ms-name">{f.titleEs||f.title}</div><div className="ms-dur">{f.duration||f.type}</div></div>
                    </div>
                  ))}
                </div>
              )}
              <div className="fgrid">
                {films.map((f,i)=>(
                  <div key={i} className="fthumb" onClick={()=>goDetail(f,"results")}>
                    {f.poster?<img src={f.poster} alt="" loading="lazy"/>:<div className="fthumb-e">🎬</div>}
                    <div className="fthumb-info">
                      <div style={{marginBottom:3}}><TypePill item={f}/></div>
                      <div className="fti-t">{f.titleEs||f.title}</div>
                      <div className="fti-m"><span className="fti-sc">⭐{f.score}</span><span>{f.year}</span></div>
                    </div>
                  </div>
                ))}
              </div>
              <button className="btn btn-p" style={{marginTop:16}} onClick={()=>goQuiz(marathon)}>Nuevo test</button>
            </div>
          </>
        )}

        {screen==="detail"&&sel&&(
          <>
            <button className="det-back-btn" onClick={()=>setScreen(prev)}>←</button>
            {sel.backdrop?<img className="det-backdrop" src={sel.backdrop} alt=""/>:<div className="det-bd-e">🎬</div>}
            <div className="det-body">
              <div className="det-over">
                <div className="det-row">
                  {sel.poster?<img className="det-poster" src={sel.poster} alt=""/>:<div className="det-poster-e">🎬</div>}
                  <div className="det-meta">
                    <div style={{marginBottom:5}}><TypePill item={sel}/></div>
                    <div className="det-title">{sel.titleEs||sel.title}</div>
                    <div className="det-info">
                      {sel.director&&<div>🎬 {sel.director}</div>}
                      <div>📅 {sel.year}{sel.duration?` · ${sel.duration}`:""}</div>
                      {sel.genres?.length>0&&<div>🏷 {sel.genres.join(", ")}</div>}
                    </div>
                  </div>
                </div>
                {sel.tagline&&<div className="det-tagline">"{sel.tagline}"</div>}
                <div className="scores-row">
                  {sel.score>0&&<div className="spill"><div className="spill-n">⭐{sel.score}</div><div className="spill-l">TMDB</div></div>}
                  {filmRevs.length>0&&<div className="spill"><div className="spill-n">{(filmRevs.reduce((a,r)=>a+r.stars,0)/filmRevs.length).toFixed(1)}</div><div className="spill-l">Rack</div></div>}
                </div>
                {sel.description&&<p className="det-desc">{sel.description}</p>}
                {sel.cast?.length>0&&<>
                  <div className="sec">Reparto</div>
                  <div className="cast-row">
                    {sel.cast.map((c,i)=>(
                      <div key={i} className="cast-item">
                        <div className="cast-av">{ini(c)}</div>
                        <div className="cast-name">{c.split(" ")[0]}</div>
                      </div>
                    ))}
                  </div>
                </>}
                <div className="det-btns">
                  <button className={`det-btn db-p${isW(sel)?" db-done":""}`} onClick={()=>markW(sel)}>{isW(sel)?"✓ Vista":"Marcar como vista"}</button>
                  <button className={`det-btn db-s${isL(sel)?" db-done":""}`} onClick={()=>addL(sel)}>{isL(sel)?"✓ En lista":"+ Mi lista"}</button>
                </div>
                <StreamLinks film={sel}/>
                <ShareBtns film={sel}/>
                <div className="sec" style={{marginTop:18}}>Tu reseña</div>
                <div className="rev-sec">
                  <div style={{fontSize:10,fontWeight:700,letterSpacing:".06em",textTransform:"uppercase",color:"var(--t3)",marginBottom:9}}>Puntúa y reseña</div>
                  <div className="stars">{[1,2,3,4,5].map(s=><button key={s} className={`star${s<=revSt?" on":""}`} onClick={()=>setRevSt(s)}>★</button>)}</div>
                  <textarea className="rev-ta" placeholder="¿Qué te pareció?" value={revTxt} onChange={e=>setRevTxt(e.target.value)}/>
                  <button className="rev-sub" disabled={!revTxt.trim()||!revSt} onClick={()=>submitRev(sel)}>Publicar reseña</button>
                </div>
                {filmRevs.length>0&&<>
                  <div className="sec">Reseñas · {filmRevs.length}</div>
                  {filmRevs.map(r=>(
                    <div key={r.id} className="rc">
                      <div className="rc-h">
                        <div className="rc-ui"><div className="rc-av">{ini(r.userName)}</div><div><div className="rc-name">{r.userName}</div><div className="rc-handle">@{r.handle}</div></div></div>
                        <div className="rc-stars">{"★".repeat(r.stars)}</div>
                      </div>
                      <p className="rc-txt">{r.text}</p>
                      <button className={`rc-like${r.likedBy.includes(user.id)?" liked":""}`} onClick={()=>toggleLike(r.id)}>♥ {r.likes}</button>
                    </div>
                  ))}
                </>}
              </div>
            </div>
          </>
        )}

        {screen==="social"&&(
          <>
            <div className="ph"><div className="logo">ra<span>ck</span></div></div>
            <div className="page" style={{paddingTop:0}}>
              <div className="tab-row">
                {["feed","ranking","reseñas","estrenos"].map(t=>(
                  <button key={t} className={`tab-btn${socTab===t?" active":""}`} onClick={()=>setSocTab(t)}>
                    {t.charAt(0).toUpperCase()+t.slice(1)}
                  </button>
                ))}
              </div>
              {socTab==="feed"&&DEMO_FEED.map((a,i)=>(
                <div key={i} className="act-item">
                  <div className="act-av">{a.u.split(" ").map(w=>w[0]).join("").slice(0,2)}</div>
                  <div className="act-body">
                    <div className="act-txt"><strong>{a.u}</strong> {a.a} <em>{a.f}</em></div>
                    <div className="act-time">hace {a.t}</div>
                  </div>
                </div>
              ))}
              {socTab==="ranking"&&[...allUsers,{id:user.id,name:user.name,score:user.score}]
                .filter((u,i,a)=>a.findIndex(x=>x.id===u.id)===i).sort((a,b)=>b.score-a.score)
                .map((u,i)=>(
                <div key={u.id} className={`rank-row${u.id===user.id?" me":""}`}>
                  <div className={`rank-n${i===0?" gold":""}`}>{i+1}</div>
                  <div className="rank-av">{ini(u.name)}</div>
                  <div className="rank-info"><div className="rank-name">{u.name}{u.id===user.id?" (tú)":""}</div><div className="rank-badge">{getBadge(u.score).icon} {getBadge(u.score).label}</div></div>
                  <div style={{textAlign:"right"}}><div className="rank-score">{u.score}</div><div style={{fontSize:9,color:"var(--t3)"}}>pts</div></div>
                </div>
              ))}
              {socTab==="reseñas"&&reviews.map(r=>(
                <div key={r.id} className="rc" style={{paddingTop:13}}>
                  <div style={{fontSize:10,fontWeight:700,letterSpacing:".08em",textTransform:"uppercase",color:"var(--acc2)",marginBottom:6}}>{r.film}</div>
                  <div className="rc-h">
                    <div className="rc-ui"><div className="rc-av">{ini(r.userName)}</div><div><div className="rc-name">{r.userName}</div><div className="rc-handle">@{r.handle}</div></div></div>
                    <div className="rc-stars">{"★".repeat(r.stars)}</div>
                  </div>
                  <p className="rc-txt" style={{marginTop:7}}>{r.text}</p>
                  <button className={`rc-like${r.likedBy.includes(user.id)?" liked":""}`} onClick={()=>toggleLike(r.id)}>♥ {r.likes}</button>
                </div>
              ))}
              {socTab==="estrenos"&&<>
                {!notif&&(
                  <div className="notif-ban" style={{marginBottom:14}}>
                    <div style={{fontSize:22}}>🔔</div>
                    <div style={{flex:1}}><div style={{fontSize:13,fontWeight:600,color:"var(--acc2)",marginBottom:2}}>Notificaciones de estrenos</div><div style={{fontSize:11,color:"var(--t3)"}}>No te pierdas ningún estreno</div></div>
                    <button className="notif-ban-btn" onClick={reqNotif}>Activar</button>
                  </div>
                )}
                {upcoming.length===0&&<div style={{textAlign:"center",padding:"32px 0"}}><div className="spinner"/></div>}
                {upcoming.map((f,i)=>(
                  <div key={i} className="up-item">
                    {f.poster?<img className="up-p" src={f.poster} alt="" loading="lazy"/>:<div className="up-pe">🎬</div>}
                    <div style={{flex:1}}>
                      <div className="up-title">{f.titleEs||f.title}</div>
                      <div className="up-date">📅 {f.releaseDate||f.year}</div>
                      <div className="up-desc">{f.description}</div>
                      <div className="toggle-wrap">
                        <div className={`toggle-track${notifF[f.id]?" on":""}`} onClick={()=>{toggleNotifF(f.id);t_(notifF[f.id]?"Cancelado":"🔔 Te avisamos del estreno");}}>
                          <div className="toggle-thumb"/>
                        </div>
                        <span className="toggle-lbl">{notifF[f.id]?"Activada":"Avisarme del estreno"}</span>
                      </div>
                    </div>
                  </div>
                ))}
              </>}
            </div>
          </>
        )}

        {screen==="profile"&&(
          <>
            <div className="prof-hd">
              <div className="prof-av">{ini(user.name)}</div>
              <div className="prof-name">{user.name}</div>
              <div className="prof-handle">@{user.handle}</div>
              <div className="prof-badge" style={{marginTop:6}}>{badge?.icon} {badge?.label}</div>
            </div>
            <div className="page" style={{paddingTop:0}}>
              <div className="score-blk">
                <div className="score-big">{user.score}</div>
                <div className="score-lbl">Puntos cinéfilos</div>
                <div className="prog-bar"><div className="prog-fill" style={{width:`${prog}%`}}/></div>
                <div className="prog-labels"><span>{badge?.icon} {badge?.label}</span>{nextB&&<span>{nextB.label} · {nextB.min-user.score} pts</span>}</div>
              </div>
              <div className="stats-row">
                <div className="stat-card"><div className="stat-n">{(user.watched||[]).length}</div><div className="stat-l">Vistas</div></div>
                <div className="stat-card"><div className="stat-n">{reviews.filter(r=>r.userId===user.id).length}</div><div className="stat-l">Reseñas</div></div>
                <div className="stat-card"><div className="stat-n">{(user.watchlist||[]).length}</div><div className="stat-l">Lista</div></div>
              </div>
              <div className="invite-row" onClick={()=>setShowInv(true)}>
                <div><div className="ir-t">Código de invitación</div><div className="ir-s" style={{fontFamily:"'DM Serif Display',serif",fontSize:18,color:"var(--acc2)",marginTop:3}}>{invCode}</div></div>
                <span style={{color:"var(--acc2)"}}>→</span>
              </div>
              {(user.watched||[]).length>0&&<>
                <div className="sec">Películas vistas</div>
                {(user.watched||[]).map((f,i)=>(
                  <div key={i} className="wl-item" onClick={()=>goDetail(f,"profile")}>
                    {f.poster?<img className="wl-p" src={f.poster} alt="" loading="lazy"/>:<div className="wl-pe">🎬</div>}
                    <div style={{flex:1,minWidth:0}}><div className="wl-title">{f.titleEs||f.title}</div><div className="wl-meta" style={{display:"flex",gap:5,alignItems:"center"}}><TypePill item={f}/> {f.year}</div></div>
                    <div className="wl-pts">+{Math.round((parseFloat(f.score)||5)*10)}</div>
                  </div>
                ))}
              </>}
              {(user.watchlist||[]).length>0&&<>
                <div className="sec">Mi lista</div>
                {(user.watchlist||[]).map((f,i)=>(
                  <div key={i} className="wl-item" onClick={()=>goDetail(f,"profile")}>
                    {f.poster?<img className="wl-p" src={f.poster} alt="" loading="lazy"/>:<div className="wl-pe">🎬</div>}
                    <div style={{flex:1,minWidth:0}}><div className="wl-title">{f.titleEs||f.title}</div><div className="wl-meta" style={{display:"flex",gap:5,alignItems:"center"}}><TypePill item={f}/> {f.year}</div></div>
                  </div>
                ))}
              </>}
              <button className="logout-btn" onClick={doLogout}>Cerrar sesión</button>
            </div>
          </>
        )}

        {screen!=="quiz"&&(
          <nav className="nav">
            {[
              {s:"home",l:"Inicio",ic:"🏠"},
              {s:"search",l:"Buscar",ic:"🔍"},
              {s:"results",l:"Para ti",ic:"✨",dis:films.length===0},
              {s:"social",l:"Social",ic:"👥"},
              {s:"profile",l:"Perfil",ic:"👤"},
            ].map(({s,l,ic,dis})=>(
              <button key={s} className={`nb${screen===s?" active":""}`} style={{opacity:dis?0.3:1}} onClick={dis?undefined:()=>setScreen(s)}>
                <div className="nb-ic">{ic}</div>
                <span>{l}</span>
              </button>
            ))}
          </nav>
        )}
      </>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
