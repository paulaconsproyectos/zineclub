async function enrichItem(item){
  try{
    const r=await fetch(`${B}/${item.mediaType}/${item.tmdbId}?api_key=${TMDB_KEY}&language=es-ES&append_to_response=credits,watch/providers`);
    const d=await r.json();
    const prov=d["watch/providers"]?.results?.ES;
    const streaming=(prov?.flatrate||[]).map(p=>p.provider_name);
    let seriesType="Serie";
    if(item.mediaType==="tv"){
      const eps=d.number_of_episodes||0,seas=d.number_of_seasons||1;
      if(seas===1&&eps<=8)seriesType="Miniserie";
      else if(seas<=3)seriesType="Serie corta";
      else seriesType="Serie larga";
    }
    return{...item,
      genre:d.genres?.[0]?.name||"",genres:(d.genres||[]).slice(0,3).map(g=>g.name),
      director:item.mediaType==="movie"?(d.credits?.crew?.find(c=>c.job==="Director")?.name||""):(d.created_by?.[0]?.name||""),
      cast:(d.credits?.cast||[]).slice(0,3).map(c=>c.name),
      duration:item.mediaType==="movie"?(d.runtime?`${Math.floor(d.runtime/60)}h ${d.runtime%60}min`:""):(d.number_of_seasons?`${d.number_of_seasons} temp.`:""),
      seriesType,streaming,tagline:d.tagline||"",country:(d.production_countries||[])[0]?.iso_3166_1||""};
  }catch{return item;}
}

async function tmdbDiscover(answers){
  const mk=MOOD_MAP[answers.mood]||"Curioso";
  const genres=(MOOD_GENRES[mk]||[18]).slice(0,2).join(",");
  const page=Math.floor(Math.random()*8)+1;
  const fmt=answers.format||"Lo que sea";
  const marathon=answers.time==="🍿 Modo Maratón";
  const wM=fmt==="Película"||fmt==="Lo que sea"||marathon;
  const wT=fmt!=="Película";
  const fetches=[];
  if(wM)fetches.push(fetch(`${B}/discover/movie?api_key=${TMDB_KEY}&language=es-ES&sort_by=vote_average.desc&vote_count.gte=500&with_genres=${genres}&page=${page}`).then(r=>r.json()).then(d=>(d.results||[]).slice(0,marathon?6:5).map(m=>({id:m.id,title:m.title,titleEs:m.title,year:m.release_date?.slice(0,4)||"—",type:"Película",mediaType:"movie",tmdbId:m.id,poster:m.poster_path?IMG+m.poster_path:null,backdrop:m.backdrop_path?ORIG+m.backdrop_path:null,description:m.overview||"",score:m.vote_average?.toFixed(1),streaming:[],genres:[]}))));
  if(wT)fetches.push(fetch(`${B}/discover/tv?api_key=${TMDB_KEY}&language=es-ES&sort_by=vote_average.desc&vote_count.gte=200&with_genres=${genres}&page=${page}`).then(r=>r.json()).then(d=>(d.results||[]).slice(0,marathon?4:3).map(m=>({id:m.id,title:m.name,titleEs:m.name,year:m.first_air_date?.slice(0,4)||"—",type:"Serie",mediaType:"tv",tmdbId:m.id,poster:m.poster_path?IMG+m.poster_path:null,backdrop:m.backdrop_path?ORIG+m.backdrop_path:null,description:m.overview||"",score:m.vote_average?.toFixed(1),streaming:[],genres:[]}))));
  const results=(await Promise.all(fetches)).flat().slice(0,marathon?12:8);
  return Promise.all(results.map(enrichItem));
}
async function tmdbWeekly(){
  const r=await fetch(`${B}/trending/all/week?api_key=${TMDB_KEY}&language=es-ES`);
  const d=await r.json();
  const top=(d.results||[])[0];if(!top)return null;
  const item={id:top.id,title:top.title||top.name,titleEs:top.title||top.name,year:(top.release_date||top.first_air_date||"").slice(0,4),type:top.media_type==="movie"?"Película":"Serie",mediaType:top.media_type,tmdbId:top.id,poster:top.poster_path?IMG+top.poster_path:null,backdrop:top.backdrop_path?ORIG+top.backdrop_path:null,description:top.overview||"",score:top.vote_average?.toFixed(1),streaming:[],genres:[]};
  return enrichItem(item);
}
async function tmdbSearch(q){
  const r=await fetch(`${B}/search/multi?api_key=${TMDB_KEY}&language=es-ES&query=${enc(q)}&page=1`);
  const d=await r.json();
  return(d.results||[]).filter(m=>m.media_type==="movie"||m.media_type==="tv").slice(0,12).map(m=>({id:m.id,title:m.title||m.name,titleEs:m.title||m.name,year:(m.release_date||m.first_air_date||"").slice(0,4),type:m.media_type==="movie"?"Película":"Serie",poster:m.poster_path?IMG+m.poster_path:null,backdrop:m.backdrop_path?ORIG+m.backdrop_path:null,description:m.overview||"",score:m.vote_average?.toFixed(1),mediaType:m.media_type,tmdbId:m.id,streaming:[],genres:[]}));
}
async function tmdbPlatform(platform){
  const PIDS={"Netflix":8,"HBO Max":384,"Disney+":337,"Prime Video":119,"Apple TV+":350,"Filmin":44,"Movistar+":149};
  const pid=PIDS[platform];if(!pid)return[];
  const r=await fetch(`${B}/discover/movie?api_key=${TMDB_KEY}&language=es-ES&sort_by=popularity.desc&watch_region=ES&with_watch_providers=${pid}&page=1`);
  const d=await r.json();
  return(d.results||[]).slice(0,8).map(m=>({id:m.id,title:m.title,titleEs:m.title,year:m.release_date?.slice(0,4)||"—",type:"Película",mediaType:"movie",tmdbId:m.id,poster:m.poster_path?IMG+m.poster_path:null,backdrop:m.backdrop_path?ORIG+m.backdrop_path:null,description:m.overview||"",score:m.vote_average?.toFixed(1),streaming:[platform],genres:[]}));
}
async function tmdbUpcoming(){
  const r=await fetch(`${B}/movie/upcoming?api_key=${TMDB_KEY}&language=es-ES&region=ES&page=1`);

}

function TypePill({item}){
  if(!item)return null;
  if(item.mediaType==="movie")return React.createElement("span",{className:"type-pill tp-m"},"🎬 Película");
  const t=item.seriesType||"Serie";
  if(t==="Miniserie")return React.createElement("span",{className:"type-pill tp-mn"},"📺 Miniserie");
  if(t==="Serie corta")return React.createElement("span",{className:"type-pill tp-sc"},"📺 Serie corta");
  return React.createElement("span",{className:"type-pill tp-sl"},"📺 Serie larga");
