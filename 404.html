<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>404 — Zine Club</title>
  <link rel="icon" href="icon-192.png"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:#09090b;color:#fff;font-family:'DM Sans','Helvetica Neue',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px;}
    .logo{font-family:'DM Serif Display',Georgia,serif;font-size:22px;letter-spacing:0.04em;color:rgba(255,255,255,0.4);margin-bottom:48px;}
    .logo span{color:#6366f1;}
    .big{font-family:'DM Serif Display',Georgia,serif;font-size:96px;font-weight:400;line-height:1;color:#fff;margin-bottom:8px;opacity:0.15;}
    .title{font-size:22px;font-weight:700;letter-spacing:-0.03em;margin-bottom:10px;}
    .sub{font-size:14px;color:rgba(255,255,255,0.4);margin-bottom:36px;line-height:1.6;}
    .btn{display:inline-block;padding:14px 32px;background:#6366f1;color:#fff;border-radius:50px;font-size:14px;font-weight:700;text-decoration:none;transition:opacity .2s;}
    .btn:hover{opacity:0.85;}
    .film-strip{position:fixed;top:0;left:0;right:0;height:32px;display:flex;gap:0;overflow:hidden;opacity:0.06;}
    .film-strip-b{position:fixed;bottom:0;left:0;right:0;height:32px;display:flex;gap:0;overflow:hidden;opacity:0.06;}
    .hole{width:24px;height:18px;background:#fff;border-radius:3px;margin:7px 8px;flex-shrink:0;}
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
</head>
<body>
  <div class="film-strip" id="ft"></div>
  <div class="logo">Zine <span>Club</span></div>
  <div class="big">404</div>
  <div class="title">Esta película no existe</div>
  <div class="sub">La página que buscas no está en nuestra cinemateca.<br/>Quizá fue retirada de cartelera.</div>
  <a href="/rack/" class="btn">Volver al inicio</a>
  <div class="film-strip-b" id="fb"></div>
  <script>
    var h='';for(var i=0;i<40;i++)h+='<div class="hole"></div>';
    document.getElementById('ft').innerHTML=h;
    document.getElementById('fb').innerHTML=h;
  </script>
</body>
</html>
